<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Final Survival Game</title>
<style>
/* ══ VFX ══ */
#vfxOverlay{position:fixed;inset:0;pointer-events:none;z-index:9998;transition:background 0.3s;}
body.vfx-bleeding #vfxOverlay{background:radial-gradient(circle,transparent 50%,rgba(180,0,0,0.4) 100%);animation:vfxP 0.8s infinite alternate;}
body.vfx-poison   #vfxOverlay{background:radial-gradient(circle,transparent 50%,rgba(0,180,0,0.4) 100%);animation:vfxP 1.2s infinite alternate;}
body.vfx-burning  #vfxOverlay{background:radial-gradient(circle,transparent 50%,rgba(255,80,0,0.4) 100%);animation:vfxP 0.5s infinite alternate;}
body.vfx-frost    #vfxOverlay{background:radial-gradient(circle,transparent 55%,rgba(0,150,255,0.4) 100%);animation:vfxP 2s infinite alternate;}
body.vfx-blind    #vfxOverlay{background:rgba(0, 0, 0, 0.6);}
body.vfx-weakness #vfxOverlay{background:radial-gradient(circle,transparent 40%,rgba(100,0,100,0.4) 100%);animation:vfxP 2s infinite alternate;}
body.vfx-corruption #vfxOverlay{background:radial-gradient(circle,transparent 40%,rgba(100,0,150,0.55) 100%);animation:vfxP 0.7s infinite alternate;}
@keyframes vfxP{from{opacity:0.5;}to{opacity:1;}}

/* ══ PAGE ══ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:radial-gradient(circle,#0b3d0b,#000);
  display:flex;flex-direction:column;
  justify-content:flex-start;align-items:center;
  color:#cfffcc;font-family:Arial,sans-serif;
  position:fixed;touch-action:none;
}

/* ══ GAME WRAPPER ══ */
#gameWrapper{
  display:flex;flex-direction:row;
  align-items:flex-start;justify-content:center;
  width:100%;height:100%;
  overflow:hidden;
}

/* ══ GAME ══ */
#game{
  display:grid;gap:0;background:#021;
  padding:2px;border:2px solid lime;
  overflow:hidden;flex-shrink:0;
  box-sizing:border-box;z-index:5;
}
.cell{
  display:flex;justify-content:center;align-items:center;
  font-size:9px;line-height:1;overflow:hidden;
}

/* ══ HUD ══ */
#hud{
  width:190px;min-width:150px;height:100vh;
  background:rgba(0,0,0,0.92);
  padding:10px;border-right:2px solid #0f0;
  font-size:12px;box-sizing:border-box;
  z-index:100;overflow-y:auto;flex-shrink:0;
  order:-1;
}
.bar-wrap{background:#111;border-radius:4px;height:9px;margin-bottom:5px;overflow:hidden;}
.bar{height:9px;background:lime;transition:width 0.3s;border-radius:4px;}

/* ══ MOBILE CONTROLS ══ */
#mobile-controls{
  display:none;flex-direction:column;
  align-items:center;gap:6px;
  padding:4px 0;flex-shrink:0;z-index:110;
  user-select:none;width:100%;
}
.ctrl-row{display:flex;gap:10px;justify-content:center;}
.ctrl-btn{
  width:52px;height:52px;
  background:rgba(0,255,0,0.12);
  border:2px solid lime;color:lime;
  border-radius:50%;font-size:18px;
  display:flex;justify-content:center;align-items:center;
  touch-action:manipulation;-webkit-touch-callout:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
}
.ctrl-btn:active{background:lime;color:#000;}
#btn-pause{border-radius:10px;width:44px;height:30px;font-size:12px;}

/* ══ PAUSE MENU ══ */
#pauseMenu{
  display:none;position:fixed;
  top:10px;left:10px;width:165px;
  background:rgba(0,8,0,0.97);
  border:2px solid lime;border-radius:12px;
  box-shadow:0 0 20px rgba(0,255,0,0.3);
  z-index:99998;flex-direction:column;
  align-items:center;gap:8px;padding:14px 10px;
}
#pauseMenu h2{color:lime;font-size:20px;margin-bottom:4px;}
#pauseInfo{color:#aaa;font-size:10px;text-align:center;line-height:1.5;margin-bottom:4px;}
.pmBtn{
  width:145px;padding:8px 0;border-radius:8px;
  cursor:pointer;font-size:13px;text-align:center;
  border:1.5px solid lime;background:rgba(0,40,0,0.8);color:#cfffcc;
}
.pmBtn:active{background:lime;color:#000;}
.pmBtn.red{border-color:#f44;background:rgba(40,0,0,0.8);}

/* ══ ALERTS ══ */
.game-alert{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.15s;
}
.game-alert.show{opacity:1;}
.alert-box{
  background:rgba(2,20,2,0.92);border:1.5px solid lime;
  padding:5px 14px;text-align:center;color:#cfffcc;
  border-radius:10px;box-shadow:0 0 14px rgba(0,255,0,0.3);white-space:nowrap;
}
.alert-box h2{margin:0;font-size:12px;}
.alert-box p{margin:2px 0 0;font-size:10px;}

/* ══ XRAY ALERT ══ */
#xrayAlert{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(60,0,80,0.95);border:2px solid #a020f0;
  border-radius:12px;padding:14px 28px;text-align:center;
  z-index:9997;color:#d0a0ff;font-size:14px;
  box-shadow:0 0 30px rgba(160,32,240,0.6);
  animation:xrayP 0.6s infinite alternate;
}
@keyframes xrayP{from{box-shadow:0 0 20px rgba(160,32,240,0.4);}to{box-shadow:0 0 50px rgba(160,32,240,0.9);}}

/* ══ GAME OVER ══ */
#gameOverScreen{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.9);z-index:99999;
  justify-content:center;align-items:center;flex-direction:column;gap:14px;
}
#gameOverScreen.show{display:flex;}
#gameOverScreen h1{color:#f44;font-size:48px;text-shadow:0 0 30px #f00;animation:pulse 0.8s infinite alternate;}
#gameOverScreen p{color:#aaa;font-size:15px;}
#retryBtn{
  background:linear-gradient(145deg,#062b06,#021a02);
  border:2px solid lime;color:#cfffcc;
  font-size:18px;padding:10px 32px;border-radius:10px;cursor:pointer;
}
@keyframes pulse{from{text-shadow:0 0 20px #f00;}to{text-shadow:0 0 50px #f00,0 0 80px #f44;}}
/* Hallucination VFX */
body.vfx-hallucination #vfxOverlay{background:radial-gradient(circle,transparent 30%,rgba(80,0,120,0.35) 70%,rgba(120,0,80,0.45) 100%);animation:vfxP 1.5s infinite alternate;}
body.vfx-hallucination1 #game{animation:halluWave 2.5s ease-in-out infinite;}
@keyframes halluWave{
  0%,100%{transform:skewX(0deg) skewY(0deg);}
  20%{transform:skewX(1.5deg) skewY(0.4deg);}
  50%{transform:skewX(-1deg) skewY(-0.3deg);}
  75%{transform:skewX(0.8deg) skewY(0.3deg);}
}
@keyframes halluShake{
  0%,100%{transform:translate(0,0) rotate(0deg);}
  15%{transform:translate(-5px,4px) rotate(-1.5deg);}
  30%{transform:translate(5px,-4px) rotate(1.5deg);}
  45%{transform:translate(-3px,5px) rotate(-0.8deg);}
  60%{transform:translate(4px,-3px) rotate(1deg);}
  80%{transform:translate(-2px,3px) rotate(-0.5deg);}
}
.hallucination-alert{
  position:fixed;background:rgba(60,0,80,0.96);border:2px solid #a020f0;
  border-radius:10px;padding:8px 12px;color:#f0c;font-size:12px;font-weight:bold;
  z-index:99990;text-align:center;animation:halluShake 0.35s infinite;pointer-events:none;
  box-shadow:0 0 24px rgba(160,32,240,0.9);
}


/* ══ RESPONSIVE ══ */
@media (max-width:768px){
  #gameWrapper{flex-direction:column;align-items:center;justify-content:flex-start;height:auto;}
  #hud{
    width:100vw;height:auto;min-height:0;
    border-left:none;border-top:2px solid #0f0;
    padding:6px 10px;
    display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;
    overflow-y:visible;flex-shrink:0;
  }
  #hud-main{min-width:110px;flex:0 0 auto;}
  #hud-effects{flex:1;min-width:120px;max-height:80px;overflow-y:auto;}
  #hud-items{flex:1;min-width:90px;}
  #mobile-controls{display:flex !important;}
}
@media (min-width:769px) and (max-width:1200px){
  #hud{width:175px;font-size:11px;}
}
</style>
</head>
<body>

<div id="gameWrapper">
<!-- HUD -->
<div id="hud">
  <div id="hud-main">
    <div style="font-size:13px;font-weight:bold;color:lime;margin-bottom:4px">🏆 Level: <span id="level">1</span></div>
    <div style="font-size:11px;margin-bottom:2px">❤️ HP</div>
    <div class="bar-wrap"><div class="bar" id="hpBar"></div></div>
    <div id="boostBarWrap" class="bar-wrap" style="display:none;margin-top:2px;background:rgba(255,0,170,0.15);"><div id="boostBar" style="height:9px;background:linear-gradient(90deg,#f0a,#f5f);transition:width 0.5s;border-radius:4px;width:0%"></div></div>
  </div>

</div>
<div id="gameSide" style="display:flex;flex-direction:column;align-items:center;justify-content:flex-start;flex:1;overflow:hidden;">
<div id="game"></div>

<!-- Mobile Controls -->
<div id="mobile-controls">
  <div class="ctrl-row">
    <button class="ctrl-btn" id="btn-pause"><i class="fas fa-pause"></i></button>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn" id="btn-up"><i class="fas fa-chevron-up"></i></button>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn" id="btn-left"><i class="fas fa-chevron-left"></i></button>
    <button class="ctrl-btn" id="btn-down"><i class="fas fa-chevron-down"></i></button>
    <button class="ctrl-btn" id="btn-right"><i class="fas fa-chevron-right"></i></button>
  </div>
</div>
</div><!-- end gameSide -->
</div><!-- end gameWrapper -->

<div id="vfxOverlay"></div>

<!-- Pause Menu -->
<div id="pauseMenu">
  <h2>⏸️ PAUSED</h2>
  <div id="pauseInfo"></div>
  <button class="pmBtn" onclick="togglePause()">▶️ Resume</button>
  <button class="pmBtn" onclick="resetLevel()">🔁 Reset Level</button>
  <button class="pmBtn red" onclick="resetGame()">🔄 Reset Game</button>
</div>

<!-- XRay Alert -->
<div id="xrayAlert">
  <div style="font-size:20px">👁️</div>
  <b>CORRUPTED MONSTER</b><br>
  <span style="font-size:11px">Seeing you!</span><br>
  <span id="xrayCountdown" style="font-size:22px;color:#f0c;font-weight:bold">4</span>
</div>

<div id="gameOverScreen">
  <h1>💀 GAME OVER</h1>
  <p id="gameOverReason"></p>
  <button id="retryBtn">🔄 RETRY</button>
</div>

<div id="gameAlert" class="game-alert">
  <div class="alert-box">
    <h2 id="alertTitle"></h2>
    <p id="alertText"></p>
  </div>
</div>

<script>
const W=60, H=120;
let VIEW_W=60, VIEW_H=30, CELL_SIZE=14;

function calcViewport(){
  const sw=window.innerWidth, sh=window.innerHeight;
  const isMobile=sw<=768;
  const isTablet=sw>768&&sw<=1200;
  if(isMobile){
    /* هاتف: HUD تحت الماب، أزرار تحت الـ HUD */
    let hudH=Math.min(90,sh*0.12);
    let ctrlH=Math.min(140,sh*0.22);
    let availW=sw-8;
    let availH=sh-hudH-ctrlH-16;
    CELL_SIZE=Math.max(8,Math.min(13,Math.floor(availW/W)));
    VIEW_W=Math.min(W,Math.floor(availW/CELL_SIZE));
    VIEW_H=Math.min(H,Math.floor(availH/CELL_SIZE));
  } else if(isTablet){
    /* تابليت: HUD جانبي ضيق */
    let availW=sw-180-8;
    let availH=sh-20;
    CELL_SIZE=Math.max(10,Math.min(14,Math.floor(availW/W)));
    VIEW_W=Math.min(W,Math.floor(availW/CELL_SIZE));
    VIEW_H=Math.min(H,Math.floor(availH/CELL_SIZE));
  } else {
    /* ديسكتوب/لاب توب */
    let availW=sw-220;
    let availH=sh-20;
    CELL_SIZE=Math.max(12,Math.min(16,Math.floor(Math.min(availW/W,availH/36))));
    VIEW_W=Math.min(W,Math.floor(availW/CELL_SIZE));
    VIEW_H=Math.min(H,Math.floor(availH/CELL_SIZE));
  }
}
calcViewport();

const game       = document.getElementById("game");
const levelEl    = document.getElementById("level");
const hpBar      = document.getElementById("hpBar");
const itemsHud   = document.getElementById("itemsHud");
const effectsHudEl = document.getElementById("effectsHud");

/* ══ MONSTER IMAGES ══ */
const monsterImgs={
  normal:"",
  fire:"./IMAGES/9e78383488055714c4d2581476472990.JPG",
  ice:"./IMAGES/3f2375a8e947bf2d2a32eb394b74a094.JPG",
  corruption:"./IMAGES/e14e65d09a00866ba47f7c3ae020f6b8.jpg",
  infected:"./IMAGES/3c5e2c1b344c4bebaddc18ec1065d0f9.jpg" /* ← صورة infected monster */
};

/* ══ STATE ══ */
let world=[], player={x:1,y:1}, monsters=[];
let stage=1, hp=100, vision=5;
let shield=false, paused=false;
let hitCooldown=false, levelCleared=false;
let activeEffects={};
let stepSize=1, magicShieldActive=false, magnetActive=false, strengthActive=false;
let speedLevel=0, speedStepsLeft=0, speedHoldActive=false;
let onLava=false;
let bleedLevel=0, bleedInterval=null, bleedHitCount=0;
let poisonLevel=0, poisonHitCount=0, poisonInterval=null;
let frostLevel=0, frostHitCount=0, frostInterval=null;
let burnLevel=0, burningInterval=null;
let corruptLevel=0, corruptHitCount=0, corruptInterval=null;
let lavaImmune=false, ghostMode=false, luckyMode=false;
let invincibleMode=false, weaknessActive=false, freezeMonsters=false;
let currentChase=null, closestDistCache=99;
let xrayActive=false;
let pausedAt=0;
let fireProtectionActive=false;
let healUpInterval=null;
let healthBoost=0;
let strengthLevel=1;
let activeTraps=[];
let halluFakeItems=[];
let halluFakeMonsters=[];
let halluInterval=null;

/* ══ EFFECT DEFS ══ */
const EFFECT_DEFS={
  freeze:{emoji:"🧊",label:"Freeze",good:true,apply:()=>{freezeMonsters=true;},remove:()=>{freezeMonsters=false;/* no lingering effect */}},
  burning:{emoji:"🔥",label:"Burning",good:false,apply:()=>{},remove:()=>{clearInterval(burningInterval);burningInterval=null;}},
  corruption:{emoji:"🟣",label:"Corruption",good:false,apply:()=>{},remove:()=>{clearInterval(corruptInterval);corruptInterval=null;corruptLevel=0;corruptHitCount=0;}},
  speed:{emoji:"⚡",label:"Speed",good:true,apply:()=>{speedHoldActive=false;},remove:()=>{speedLevel=0;speedStepsLeft=0;stepSize=1;}},
  magicShield:{emoji:"🔮",label:"Magic Shield",good:true,apply:()=>{magicShieldActive=true;},remove:()=>{magicShieldActive=false;}},
  magnet:{emoji:"🧲",label:"Magnet",good:true,apply:()=>{magnetActive=true;},remove:()=>{magnetActive=false;}},
  reveal:{emoji:"🗺️",label:"Reveal",good:true,apply:()=>{vision=99;},remove:()=>{vision=5;}},
  fireProtection:{emoji:"🔥🛡️",label:"Fire Protection",good:true,apply:()=>{lavaImmune=true;fireProtectionActive=true;},remove:()=>{lavaImmune=false;fireProtectionActive=false;}},
  ghost:{emoji:"👻",label:"Ghost",good:true,apply:()=>{ghostMode=true;},remove:()=>{ghostMode=false;}},
  lucky:{emoji:"⭐",label:"Lucky",good:true,apply:()=>{luckyMode=true;},remove:()=>{luckyMode=false;}},
  invincible:{emoji:"💫",label:"Invincible",good:true,apply:()=>{invincibleMode=true;},remove:()=>{invincibleMode=false;}},
  weakness:{emoji:"💀",label:"Weakness",good:false,apply:()=>{weaknessActive=true;},remove:()=>{weaknessActive=false;}},
  shield:{emoji:"🛡️",label:"Shield",good:true,apply:()=>{shield=true;},remove:()=>{shield=false;}},
  strength:{emoji:"💪",label:"Strength I",good:true,apply:()=>{strengthActive=true;strengthLevel=1;},remove:()=>{strengthActive=false;strengthLevel=1;}},
  blind:{emoji:"🌫️",label:"Blind",good:false,apply:()=>{vision=2;},remove:()=>{vision=5;}},
  frost:{emoji:"❄️",label:"Frost",good:false,apply:()=>{},remove:()=>{clearInterval(frostInterval);frostInterval=null;frostLevel=0;frostHitCount=0;}},
  bleeding:{emoji:"🩸",label:"Bleeding",good:false,apply:()=>{},remove:()=>{clearInterval(bleedInterval);bleedInterval=null;bleedLevel=0;bleedHitCount=0;}},
  poison:{emoji:"☠️",label:"Poison",good:false,apply:()=>{},remove:()=>{clearInterval(poisonInterval);poisonInterval=null;poisonLevel=0;poisonHitCount=0;}},
  regenI:{emoji:"💚",label:"Regeneration I",good:true,apply:()=>{},remove:()=>{clearInterval(healUpInterval);healUpInterval=null;}},
  regenII:{emoji:"💚💚",label:"Regeneration II",good:true,apply:()=>{},remove:()=>{clearInterval(healUpInterval);healUpInterval=null;}},
  strengthII:{emoji:"💪💪",label:"Strength II",good:true,apply:()=>{strengthActive=true;strengthLevel=2;},remove:()=>{strengthActive=false;strengthLevel=1;}},
  strengthIII:{emoji:"💪💪💪",label:"Strength III",good:true,apply:()=>{strengthActive=true;strengthLevel=3;},remove:()=>{strengthActive=false;strengthLevel=1;}},
  healthBoostI:{emoji:"❤️+",label:"Health Boost I",good:true,apply:()=>{healthBoost=25;},remove:()=>{healthBoost=0;}},
  healthBoostII:{emoji:"❤️++",label:"Health Boost II",good:true,apply:()=>{healthBoost=50;},remove:()=>{healthBoost=0;}},
  healthBoostIII:{emoji:"❤️+++",label:"Health Boost III",good:true,apply:()=>{healthBoost=100;},remove:()=>{healthBoost=0;}},
  hallucinationI:{emoji:"🌀",label:"Hallucination I",good:false,apply:()=>{},remove:()=>{clearInterval(halluInterval);halluInterval=null;halluFakeItems=[];}},
  hallucinationII:{emoji:"🌀🌀",label:"Hallucination II",good:false,apply:()=>{},remove:()=>{clearInterval(halluInterval);halluInterval=null;halluFakeItems=[];halluFakeMonsters=[];}},
  hallucinationIII:{emoji:"🌀🌀🌀",label:"Hallucination III",good:false,apply:()=>{},remove:()=>{clearInterval(halluInterval);halluInterval=null;halluFakeMonsters=[];}}
};

const QUESTION_EFFECTS=["weakness","magicShield","blind","magnet","reveal","fireProtection","ghost","lucky","invincible","strengthIII","healthBoostI","healthBoostII","healthBoostIII"];

/* ══ HELPERS ══ */
function getRoman(l){return l===1?"I":l===2?"II":"III";}
function getBleedDPS(l){return l===1?2:l===2?4:7;}
function getPoisonDPS(l){return l===1?3:l===2?6:10;}
function getBurnDPS(l){return l===1?3:l===2?5:8;}
function getFrostDPS(l){return l===1?2:l===2?4:7;}
function getCorruptDPS(l){return l===1?2:l===2?5:9;}
function getLevelDur(l){return l===1?10000:l===2?8000:6000;}


/* ══ EFFECT OPPOSITION MATH ══ */
const EFFECT_OPP_LEVEL={"strength":1,"strengthII":2,"strengthIII":3,"weakness":1,"blind":1,"reveal":1};
const EFFECT_OPP_PAIRS=[
  {a:["strength","strengthII","strengthIII"], b:["weakness"]},
  {a:["blind"], b:["reveal"]}
];
const STRENGTH_BY_LVL=["","strength","strengthII","strengthIII"];

function resolveOpposing(name){
  for(let pair of EFFECT_OPP_PAIRS){
    let inA=pair.a.includes(name), inB=pair.b.includes(name);
    if(!inA&&!inB) continue;
    let myGroup=inA?pair.a:pair.b, oppGroup=inA?pair.b:pair.a;
    /* حساب مستوى الطرفين */
    let myLvl=EFFECT_OPP_LEVEL[name]||1;
    let oppActive=oppGroup.find(n=>activeEffects[n]);
    if(!oppActive) continue;
    let oppLvl=EFFECT_OPP_LEVEL[oppActive]||1;
    /* إزالة الطرفين */
    [...myGroup,...oppGroup].forEach(n=>{
      if(activeEffects[n]){clearTimeout(activeEffects[n].timer);if(EFFECT_DEFS[n])EFFECT_DEFS[n].remove();delete activeEffects[n];}
    });
    let diff=myLvl-oppLvl;
    if(diff>0){
      /* الجديد أقوى: يبقى بمستوى diff */
      let winner=pair.a.includes(name)?STRENGTH_BY_LVL[diff]:null;
      if(winner&&EFFECT_DEFS[winner]) applyEffect(winner);
      else if(!pair.a.includes(name)&&diff===1) applyEffect("weakness");
    } else if(diff<0){
      /* المعارض أقوى: يبقى بمستوى -diff */
      let winner=pair.a.includes(oppActive)?STRENGTH_BY_LVL[-diff]:null;
      if(winner&&EFFECT_DEFS[winner]) applyEffect(winner);
      else if(!pair.a.includes(oppActive)&&-diff===1) applyEffect("weakness");
    }
    /* diff===0: كلاهما يختفي */
    drawHud();
    return true; /* تم الحل */
  }
  return false;
}
/* ══ APPLY EFFECT ══ */
function applyEffect(name){
  const def=EFFECT_DEFS[name]; if(!def)return;
  if(activeEffects[name]){clearTimeout(activeEffects[name].timer);def.remove();}
  const goodDur={freeze:7000,speed:8000,magicShield:10000,magnet:12000,reveal:9000,fireProtection:15000,ghost:8000,lucky:10000,invincible:7000,strength:10000,shield:8000,regenI:6000,regenII:8000,strengthII:10000,strengthIII:12000,healthBoostI:15000,healthBoostII:15000,healthBoostIII:15000};
  const badDur={weakness:10000,blind:5000,poison:8000,bleeding:10000,burning:7000,hallucinationI:12000,hallucinationII:15000,hallucinationIII:18000};
  let dur=def.good?(goodDur[name]||7000):(badDur[name]||5000);
  def.apply();
  if(name==="poison"){
    poisonHitCount++;poisonLevel=poisonHitCount>=3?3:poisonHitCount>=2?2:1;
    let pdps=getPoisonDPS(poisonLevel),pdur=getLevelDur(poisonLevel);
    EFFECT_DEFS["poison"].label=`Poison ${getRoman(poisonLevel)}`;
    clearInterval(poisonInterval);
    if(activeEffects["poison"])clearTimeout(activeEffects["poison"].timer);
    poisonInterval=setInterval(()=>{
      if(paused)return;if(!activeEffects["poison"]){clearInterval(poisonInterval);poisonInterval=null;return;}
      hp-=pdps;ludki(`☠️ Poison ${getRoman(poisonLevel)}`,`−${pdps} HP/s`,"damage");
      if(hp<=0)triggerDeath(`Poisoned ☠️`);drawWorld();
    },1000);
    activeEffects[name]={endTime:Date.now()+pdur,timer:setTimeout(()=>{EFFECT_DEFS["poison"].remove();delete activeEffects["poison"];drawHud();},pdur)};
    ludki(`⚠️ Poison ${getRoman(poisonLevel)}`,"Watch out!","damage");drawHud();return;
  }
  if(name==="magnet"){
    let mInt=setInterval(()=>{
      if(!magnetActive){clearInterval(mInt);return;}
      for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){
        let nx=player.x+dx,ny=player.y+dy;
        if(nx<0||ny<0||nx>=W||ny>=H)continue;
        if(itemTarget[world[ny][nx]]){world[ny][nx]="empty";itemCollected[world[ny][nx]||""]=(itemCollected[world[ny][nx]||""]||0)+(luckyMode?2:1);}
      }
    },500);
  }
  activeEffects[name]={endTime:Date.now()+dur,timer:setTimeout(()=>{def.remove();delete activeEffects[name];drawHud();},dur)};
  /* تحقق من التعارض */
  if(!resolveOpposing(name)){
    ludki((def.good?"✅ ":"⚠️ ")+def.label,def.good?"Active!":"Watch out!",def.good?"collect":"damage");
    drawHud();
  }
}

function floodFill(wx,wy){
  let v=new Set(),q=[[wx,wy]];v.add(wy*W+wx);
  while(q.length){let[cx,cy]=q.shift();for(let[dx,dy] of[[1,0],[-1,0],[0,1],[0,-1]]){let nx=cx+dx,ny=cy+dy;if(nx>=0&&ny>=0&&nx<W&&ny<H&&!v.has(ny*W+nx)&&world[ny][nx]!=="tree"){v.add(ny*W+nx);q.push([nx,ny]);}}}
  return v;
}

function resetEffects(){
  for(let n in activeEffects){clearTimeout(activeEffects[n].timer);if(EFFECT_DEFS[n])EFFECT_DEFS[n].remove();}
  activeEffects={};stepSize=1;magicShieldActive=false;magnetActive=false;lavaImmune=false;
  ghostMode=false;luckyMode=false;invincibleMode=false;weaknessActive=false;strengthActive=false;

  clearInterval(frostInterval);frostInterval=null;

  bleedLevel=0;bleedHitCount=0;poisonLevel=0;poisonHitCount=0;
  frostLevel=0;frostHitCount=0;burnLevel=0;speedLevel=0;speedStepsLeft=0;
  corruptLevel=0;corruptHitCount=0;activeTraps=[];xrayActive=false;
  fireProtectionActive=false;clearInterval(healUpInterval);healUpInterval=null;

function createWorld(){
  let attempts=0;
  while(true){
    attempts++;world=[];
    for(let y=0;y<H;y++){let row=[];for(let x=0;x<W;x++)row.push(Math.random()<0.18?"tree":"empty");world.push(row);}
    world[1][1]="empty";world[H-2][W-2]="empty";
    let reachable=floodFill(1,1),totalEmpty=0;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]!=="tree")totalEmpty++;
    if(reachable.size>=totalEmpty*0.85){
      for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]!=="tree"&&!reachable.has(y*W+x))world[y][x]="tree";
      break;
    }
    if(attempts>10){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]==="tree"&&Math.random()<0.4)world[y][x]="empty";break;}
  }
  player={x:1,y:1};resetEffects();
}

function getReachableCells(){
  let cells=[];floodFill(player.x,player.y).forEach(id=>{let x=id%W,y=Math.floor(id/W);if(world[y][x]==="empty")cells.push({x,y});});return cells;
}
function randomEmptyCell(cells){for(let i=0;i<200;i++){let c=cells[Math.floor(Math.random()*cells.length)];if(c&&world[c.y][c.x]==="empty")return c;}return null;}

function spawnMonsters(){
  let cells=getReachableCells();monsters=[];
  let types=["normal"];
  if(stage>=3)types.push("fire");
  if(stage>=6)types.push("ice");
  if(stage>=4)types.push("infected");
  if(stage>=5&&stage%5===0)types.push("corruption");
  for(let type of types){
    let best=null;
    for(let i=0;i<50;i++){
      let cell=cells[Math.floor(Math.random()*cells.length)];if(!cell)continue;
      let d=Math.abs(cell.x-player.x)+Math.abs(cell.y-player.y);
      let farFromOthers=monsters.every(m=>Math.abs(m.x-cell.x)+Math.abs(m.y-cell.y)>10);
      if(d>20&&farFromOthers)best=cell;
    }
    if(best)monsters.push({x:best.x,y:best.y,type,cd1:0,cd2:0,cd3:0,traps:0});
  }
  if(monsters.length===0)monsters=[{x:W-2,y:H-2,type:"normal",cd1:0,cd2:0,cd3:0,traps:0}];
}

function placeItems(){
  itemTarget={};itemCollected={};
  let cells=getReachableCells();
  let all=["gold","copper","silver","diamond","iron","obsidian"];
  let active=all.sort(()=>Math.random()-0.5).slice(0,4);
  if(!active.includes("gold"))active[0]="gold";
  active.forEach(type=>{
    let count=type==="gold"?Math.floor(Math.random()*16)+10:Math.floor(Math.random()*9)+2;
    itemTarget[type]=count;itemCollected[type]=0;
    let placed=0;while(placed<count){let c=randomEmptyCell(cells);if(!c)break;world[c.y][c.x]=type;placed++;}
  });
  for(let i=0;i<10;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="med";}
  for(let i=0;i<3;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="medkit";}
  for(let i=0;i<8;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="energy";}
  for(let i=0;i<5;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="question";}
  for(let i=0;i<5;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="freeze";}
  for(let i=0;i<6;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="poison_item";}
  for(let i=0;i<8;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="bandage";}
  if(active.includes("obsidian")){
    for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]==="obsidian"){
      let nb=[[x+1,y],[x-1,y],[x,y+1],[x,y-1],[x+1,y+1],[x-1,y-1],[x+1,y-1],[x-1,y+1]];
      for(let[nx,ny] of nb)if(nx>=0&&ny>=0&&nx<W&&ny<H&&world[ny][nx]==="empty"&&Math.random()<0.6)world[ny][nx]="lava";
    }
  }
}

/* ══ EFFECT SYSTEMS ══ */
function startBleeding(){
  bleedHitCount++;
  let nl=bleedLevel;
  if(hp<30||bleedHitCount>=3)nl=3;else if(hp<60||bleedHitCount>=2)nl=2;else nl=1;
  bleedLevel=nl;clearInterval(bleedInterval);
  if(activeEffects["bleeding"])clearTimeout(activeEffects["bleeding"].timer);
  let dps=getBleedDPS(bleedLevel),label=`Bleeding ${getRoman(bleedLevel)}`;
  bleedInterval=setInterval(()=>{
    if(paused)return;if(!activeEffects["bleeding"]){clearInterval(bleedInterval);bleedInterval=null;return;}
    hp-=dps;ludki(`🩸 ${label}`,`−${dps} HP/s`,"damage");playSound(sounds.bleed);
    if(hp<=0)triggerDeath(`Bled out 🩸`);drawWorld();
  },1000);
  EFFECT_DEFS["bleeding"].label=label;
  let dur=getLevelDur(bleedLevel);
  activeEffects["bleeding"]={endTime:Date.now()+dur,timer:setTimeout(()=>{clearInterval(bleedInterval);bleedInterval=null;bleedLevel=0;bleedHitCount=0;delete activeEffects["bleeding"];drawHud();},dur)};
  drawHud();
}

function startFrost(level){
  frostHitCount++;frostLevel=Math.min(3,level||frostHitCount);
  let fdps=getFrostDPS(frostLevel),fdur=getLevelDur(frostLevel);
  EFFECT_DEFS["frost"].label=`Frost ${getRoman(frostLevel)}`;
  clearInterval(frostInterval);if(activeEffects["frost"])clearTimeout(activeEffects["frost"].timer);

/* ══ HALLUCINATION SYSTEM ══ */
const FAKE_ITEM_EMOJIS=["💰","🧪","🥤","❓","💎","⛓️"];

function startHallucination(level){
  /* أوقف الهلوسه القديمة */
  for(let l of[1,2,3]){
    let n="hallucination"+["I","II","III"][l-1];
    if(activeEffects[n]){clearTimeout(activeEffects[n].timer);EFFECT_DEFS[n].remove();delete activeEffects[n];}
  }
  clearInterval(halluInterval);halluInterval=null;
  halluFakeItems=[];halluFakeMonsters=[];
  
  let effName=level===1?"hallucinationI":level===2?"hallucinationII":"hallucinationIII";
  let dur=level===1?12000:level===2?15000:18000;
  EFFECT_DEFS[effName].apply();
  
  if(level===1){
    /* Hallucination I: screen wavy only - no interval needed */
  }
  if(level>=2){
    /* Hallucination II: fake items spawn */
    halluInterval=setInterval(()=>{
      if(paused)return;
      /* إضافة عنصر وهمي */
      if(halluFakeItems.length<6){
        let angle=Math.random()*Math.PI*2;
        let r=3+Math.floor(Math.random()*8);
        let fx=Math.round(player.x+Math.cos(angle)*r);
        let fy=Math.round(player.y+Math.sin(angle)*r);
        if(fx>=0&&fy>=0&&fx<W&&fy<H&&world[fy][fx]==="empty"){
          halluFakeItems.push({x:fx,y:fy,emoji:FAKE_ITEM_EMOJIS[Math.floor(Math.random()*FAKE_ITEM_EMOJIS.length)]});
        }
      }
      /* حركة الوحوش الوهمية */
      if(level===3){
        halluFakeMonsters.forEach(fm=>{
          if(paused)return;
          let dx=player.x>fm.x?1:player.x<fm.x?-1:0;
          let dy=player.y>fm.y?1:player.y<fm.y?-1:0;
          let nx=fm.x+dx,ny=fm.y+dy;
          if(nx>=0&&ny>=0&&nx<W&&ny<H&&world[ny][nx]!=="tree"&&world[ny][nx]!=="spike"){fm.x=nx;fm.y=ny;}
          if(fm.x===player.x&&fm.y===player.y&&!hitCooldown&&!invincibleMode){
            hp-=20;ludki("👾 Hallucination","Fake monster hit! −20 HP","damage");
            hitCooldown=true;setTimeout(()=>hitCooldown=false,1000);
            if(hp<=0)triggerDeath("Killed by Hallucination 👾");
          }
        });
      }
      drawWorld();
    },level===3?300:600);
  }
  if(level===3){
    /* Hallucination III: spawn fake monsters */
    let count=2+Math.floor(Math.random()*4);
    for(let i=0;i<count;i++){
      let angle=(i/count)*Math.PI*2;
      let r=8+Math.floor(Math.random()*6);
      let fx=Math.round(player.x+Math.cos(angle)*r);
      let fy=Math.round(player.y+Math.sin(angle)*r);
      if(fx>=0&&fy>=0&&fx<W&&fy<H) halluFakeMonsters.push({x:fx,y:fy});
    }
  }
  
  activeEffects[effName]={
    endTime:Date.now()+dur,
    timer:setTimeout(()=>{
      EFFECT_DEFS[effName].remove();delete activeEffects[effName];
      halluFakeItems=[];halluFakeMonsters=[];
      clearInterval(halluInterval);halluInterval=null;
      drawHud();
    },dur)
  };
  ludki(`🌀 Hallucination ${["I","II","III"][level-1]}`,"Watch out!","damage");
  drawHud();
}

function infectedVoidStar(monster){
  if(monster.cd2>0)return;monster.cd2=20;
  /* اتجاه نحو اللاعب */
  let dx=player.x>monster.x?1:player.x<monster.x?-1:0;
  let dy=player.y>monster.y?1:player.y<monster.y?-1:0;
  if(dx===0&&dy===0)dy=1;
  let bx=monster.x,by=monster.y;
  let interval=setInterval(()=>{
    if(paused)return;
    bx+=dx;by+=dy;
    if(bx<0||by<0||bx>=W||by>=H){clearInterval(interval);return;}
    /* خبطت لاعب */
    if(bx===player.x&&by===player.y){
      clearInterval(interval);
      hp-=15;ludki("⭐ Void Star","Direct Hit! −15 HP","damage");
      playSound(sounds.voidstar_sfx||sounds.effect);
      if(hp<=0)triggerDeath("Killed by Void Star ⭐");
      return;
    }
    /* خبطت شجرة → voidzone */
    if(world[by][bx]==="tree"){
      clearInterval(interval);
      world[by][bx]="empty";
      /* إنشاء voidzone 2x2 حول مكان الاصطدام */
      for(let vy=by-2;vy<=by+2;vy++) for(let vx=bx-2;vx<=bx+2;vx++){
        if(vx>=0&&vy>=0&&vx<W&&vy<H&&world[vy][vx]==="empty"){
          world[vy][vx]="voidzone";
        }
      }
      playSound(sounds.voidstar_sfx||sounds.effect);
      drawWorld();
      /* تختفي بعد 15s */
      setTimeout(()=>{
        for(let vy=by-2;vy<=by+2;vy++) for(let vx=bx-2;vx<=bx+2;vx++){
          if(vx>=0&&vy>=0&&vx<W&&vy<H&&world[vy][vx]==="voidzone") world[vy][vx]="empty";
        }
        drawWorld();
      },15000);
      return;
    }
    /* النجمة تتحرك */
    if(world[by][bx]==="empty") world[by][bx]="voidstar";
    setTimeout(()=>{if(world[by][bx]==="voidstar") world[by][bx]="empty";drawWorld();},200);
    drawWorld();
  },120);
}

/* ══ CORRUPTION ABILITIES ══ */
function corruptSpikes(monster){
  if(monster.cd1>0)return;monster.cd1=40;
  let pattern=Math.floor(Math.random()*4),positions=[],spikesPlaced=0;
  if(pattern===0){/* خط مستقيم */
    let dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1},{dx:1,dy:1},{dx:-1,dy:-1},{dx:1,dy:-1},{dx:-1,dy:1}];
    let dir=dirs[Math.floor(Math.random()*dirs.length)];
    for(let i=1;i<=25&&spikesPlaced<25;i++){
      let sx=monster.x+dir.dx*i,sy=monster.y+dir.dy*i;
      if(sx>=0&&sy>=0&&sx<W&&sy<H&&world[sy][sx]==="empty"){positions.push({x:sx,y:sy});spikesPlaced++;}
    }
  }else if(pattern===1){/* wavy */
    let dx=player.x>monster.x?1:-1;
    for(let i=1;i<=25&&spikesPlaced<25;i++){
      let sx=monster.x+dx*i,sy=monster.y+Math.round(Math.sin(i*0.6)*3);
      if(sx>=0&&sy>=0&&sx<W&&sy<H&&world[sy][sx]==="empty"){positions.push({x:sx,y:sy});spikesPlaced++;}
    }
  }else if(pattern===2){/* دائري */
    for(let a=0;a<360&&spikesPlaced<25;a+=15){
      let r=4+Math.floor(spikesPlaced/8);
      let sx=Math.round(monster.x+r*Math.cos(a*Math.PI/180));
      let sy=Math.round(monster.y+r*Math.sin(a*Math.PI/180));
      if(sx>=0&&sy>=0&&sx<W&&sy<H&&world[sy][sx]==="empty"&&!positions.find(p=>p.x===sx&&p.y===sy)){positions.push({x:sx,y:sy});spikesPlaced++;}
    }
  }else{/* عشوائي */
    let tried=0;
    while(spikesPlaced<25&&tried<200){tried++;let sx=monster.x+Math.round((Math.random()-0.5)*14),sy=monster.y+Math.round((Math.random()-0.5)*14);
      if(sx>=0&&sy>=0&&sx<W&&sy<H&&world[sy][sx]==="empty"&&!positions.find(p=>p.x===sx&&p.y===sy)){positions.push({x:sx,y:sy});spikesPlaced++;}}
  }
  /* ضع تدريجياً */
  positions.forEach((p,i)=>setTimeout(()=>{if(world[p.y][p.x]==="empty"){world[p.y][p.x]="spike";drawWorld();}},i*80));
  setTimeout(()=>{for(let p of positions)if(world[p.y][p.x]==="spike")world[p.y][p.x]="empty";drawWorld();},18000);
}

function corruptTrap(monster){
  activeTraps=activeTraps.filter(t=>world[t.y][t.x]==="trap");
  if(monster.cd2>0||activeTraps.length>=3)return;
  monster.cd2=60;
  /* دائرة من 3 وحدات حول الوحش */
  let trapCells=[];
  let radius=3;
  for(let dy=-radius;dy<=radius;dy++)for(let dx=-radius;dx<=radius;dx++){
    if(dx*dx+dy*dy<=radius*radius){
      let tx=monster.x+dx,ty=monster.y+dy;
      if(tx>=0&&ty>=0&&tx<W&&ty<H&&world[ty][tx]==="empty"){
        world[ty][tx]="trap";trapCells.push({x:tx,y:ty});
      }
    }
  }
  activeTraps.push(...trapCells);
  drawWorld();
}

/* ══ HANDLE CELL ══ */
function handleCell(nx,ny){
  let cell=world[ny][nx];
  /* عنصر وهمي */
  let fakeIdx=halluFakeItems.findIndex(fi=>fi.x===nx&&fi.y===ny);
  if(fakeIdx>=0){
    halluFakeItems.splice(fakeIdx,1);
    hp=Math.max(1,hp-3);
    ludki("💔 Fake Item","It was a hallucination! −3 HP","damage");
    if(hp<=0)triggerDeath("Tricked by Hallucination 🌀");
  }
  /* voidzone */
  if(cell==="voidzone"){
    world[ny][nx]="empty";
    startHallucination(3);
    showVoidZoneAlerts();
    playSound(sounds.hallucination_sfx||sounds.effect);
  }
  if(cell==="spike"){startCorruption(2);ludki("🗡️ Spike","Corruption II!","damage");}
  if(cell==="trap"){world[ny][nx]="empty";activeTraps=activeTraps.filter(t=>!(t.x===nx&&t.y===ny));startCorruption(3);ludki("⬛ Trap","Corruption III!","damage");}
  if(cell==="firezone"&&!lavaImmune&&!fireProtectionActive){burnLevel=Math.max(burnLevel,1);startBurning();ludki("🔸 Fire Zone","Burning!","damage");playSound(sounds.burn);}
  if(cell==="icezone"){startFrost(2);ludki("🔹 Ice Zone","Frost II!","damage");}
  if(cell==="scorch"){burnLevel=0;startBurning();ludki("💨 Fire Scorch","Burning I","damage");playSound(sounds.burn);}
  if(cell==="icescorch"){startFrost(1);ludki("🧊 Ice Scorch","Frost I","damage");}
  if(cell==="lava"){
    if(!lavaImmune){hp-=25;ludki("🔥 LAVA","−25 HP | Burning!","damage");playSound(sounds.burn);if(hp<=0){triggerDeath("Burned by Lava 🌋");drawWorld();return;}startBurning();}
    else ludki("🌋 Immune","Lava has no effect!","collect");
    return;
  }
  if(cell==="med"){
    world[ny][nx]="empty";
    startRegenII();
    applyEffect("strengthII");
    ludki("🧪 MED","+25 HP | Strength II 💪💪","heal");
    playSound(sounds.med);
  }else if(cell==="medkit"){
    world[ny][nx]="empty";hp=100;
    /* يشيل weakness + burning (كل المستويات) + bleeding (كل المستويات) */
    for(let eff of["weakness","burning","bleeding","corruption"])if(activeEffects[eff]){clearTimeout(activeEffects[eff].timer);EFFECT_DEFS[eff].remove();delete activeEffects[eff];}
    clearInterval(burningInterval);burningInterval=null;burnLevel=0;
    clearInterval(bleedInterval);bleedInterval=null;bleedLevel=0;bleedHitCount=0;
    applyEffect("shield");ludki("🧰 MEDKIT","Full HP + Shield 🛡️","collect");playSound(sounds.medkit);
  }else if(cell==="bandage"){
    let needsHealing=hp<100||activeEffects["bleeding"]||activeEffects["burning"];
    if(needsHealing){
      world[ny][nx]="empty";
      startRegenI();
      playSound(sounds.medkit);
    }
  }else if(cell==="energy"){
    world[ny][nx]="empty";
    if(activeEffects["speed"])speedLevel=Math.min(3,speedLevel+1);else speedLevel=1;
    EFFECT_DEFS["speed"].label=`Speed ${getRoman(speedLevel)}`;
    speedStepsLeft=speedLevel===1?4:speedLevel===2?7:12;
    applyEffect("speed");
    /* يديني Strength I مع السبيد */
    applyEffect("strength");
    ludki("🥤 Energy","Speed + Strength I!","collect");
    playSound(sounds.effect);
  }else if(cell==="question"){
    world[ny][nx]="empty";applyEffect(QUESTION_EFFECTS[Math.floor(Math.random()*QUESTION_EFFECTS.length)]);playSound(sounds.effect);
  }else if(cell==="freeze"){
    world[ny][nx]="empty";
    freezeMonsters=true;
    let freezeDur=7000;
    /* أظهر alert مع عداد */
    let freezeEl=document.getElementById("freezeAlert");
    if(!freezeEl){
      freezeEl=document.createElement("div");freezeEl.id="freezeAlert";
      freezeEl.style.cssText="position:fixed;top:50px;left:50%;transform:translateX(-50%);background:rgba(0,50,100,0.95);border:2px solid #0af;border-radius:10px;padding:10px 20px;color:#0ff;font-size:14px;z-index:9996;text-align:center;";
      document.body.appendChild(freezeEl);
    }
    let freezeSec=7;
    freezeEl.innerHTML=`🧊 Monsters Frozen<br><b style="font-size:18px">${freezeSec}s</b>`;
    freezeEl.style.display="block";
    let freezeCount=setInterval(()=>{
      freezeSec--;
      if(freezeEl)freezeEl.innerHTML=`🧊 Monsters Frozen<br><b style="font-size:18px">${freezeSec}s</b>`;
      if(freezeSec<=0){clearInterval(freezeCount);freezeMonsters=false;if(freezeEl)freezeEl.style.display="none";}
    },1000);
    playSound(sounds.effect);
  }
  else if(cell==="poison_item"){world[ny][nx]="empty";applyEffect("poison");playSound(sounds.effect);}
  else if(itemTarget[cell]){
    world[ny][nx]="empty";let gain=luckyMode?2:1;
    itemCollected[cell]=(itemCollected[cell]||0)+gain;
    ludki("COLLECT",`+${gain} ${itemName[cell]||cell}`,"collect");
    if(cell==="gold")playSound(sounds.gold);else if(cell==="diamond")playSound(sounds.diamond);else playSound(sounds.collect);
  }
}

const keysHeld={};
document.addEventListener("keydown",e=>{keysHeld[e.key]=true;});
document.addEventListener("keyup",e=>{keysHeld[e.key]=false;});

let speedHoldInterval=null;
function startSpeedHold(dx,dy){
  if(speedHoldInterval)return;
  let units=speedLevel===1?4:speedLevel===2?7:12,stepsInHold=0;
  speedHoldInterval=setInterval(()=>{
    if(paused||!activeEffects["speed"]){clearInterval(speedHoldInterval);speedHoldInterval=null;return;}
    let anyHeld=keysHeld["ArrowUp"]||keysHeld["ArrowDown"]||keysHeld["ArrowLeft"]||keysHeld["ArrowRight"]||keysHeld["w"]||keysHeld["s"]||keysHeld["a"]||keysHeld["d"]||keysHeld["W"]||keysHeld["S"]||keysHeld["A"]||keysHeld["D"];
    if(!anyHeld){clearInterval(speedHoldInterval);speedHoldInterval=null;stepsInHold=0;return;}
    if(stepsInHold>=units){clearInterval(speedHoldInterval);speedHoldInterval=null;stepsInHold=0;return;}
    let nx=player.x+dx,ny=player.y+dy;
    if(nx>=0&&ny>=0&&nx<W&&ny<H&&(world[ny][nx]!=="tree"||ghostMode)&&world[ny][nx]!=="spike"){
      player.x=nx;player.y=ny;playSoundOnce(sounds.walk);updateBurningTimer();handleCell(nx,ny);drawWorld();
    }
    stepsInHold++;
  },80);
}

/* ══ PAUSE ══ */
function togglePause(){
  paused=!paused;
  const menu=document.getElementById("pauseMenu");
  const btn=document.getElementById("btn-pause");
  if(paused){
    pausedAt=Date.now();
    /* أوقف كل شيء */
    stopAllMusic();
    clearInterval(window._gameLoop);window._gameLoop=null;
    /* أوقف كل الـ damage/heal intervals */
    if(bleedInterval){clearInterval(bleedInterval);bleedInterval=null;}
    if(poisonInterval){clearInterval(poisonInterval);poisonInterval=null;}
    if(burningInterval){clearInterval(burningInterval);burningInterval=null;}
    if(frostInterval){clearInterval(frostInterval);frostInterval=null;}
    if(corruptInterval){clearInterval(corruptInterval);corruptInterval=null;}
    if(healUpInterval){clearInterval(healUpInterval);healUpInterval=null;}
    if(halluInterval){clearInterval(halluInterval);halluInterval=null;}
    /* أوقف كل الـ effect setTimeout timers */
    for(let n in activeEffects){
      if(activeEffects[n].timer){clearTimeout(activeEffects[n].timer);activeEffects[n].timer=null;}
    }
    if(menu)menu.style.display="flex";
    if(btn)btn.innerHTML='<i class="fas fa-play"></i>';
    document.getElementById("pauseInfo").innerHTML=`❤️ ${hp}/100 | 🏆 Lvl ${stage}<br>👹 ${monsters.length} monsters`;
  }else{
    /* حساب مدة الـ pause */
    let pausedDuration=Date.now()-pausedAt;
    /* أعد كل الـ endTimes للأمام بمقدار مدة الـ pause */
    for(let n in activeEffects){
      if(activeEffects[n].endTime){
        activeEffects[n].endTime+=pausedDuration;
        /* أعد تشغيل الـ setTimeout */
        let remaining=activeEffects[n].endTime-Date.now();
        if(remaining>0){
          activeEffects[n].timer=setTimeout(()=>{
            if(EFFECT_DEFS[n])EFFECT_DEFS[n].remove();
            delete activeEffects[n];
            drawHud();
          },remaining);
        } else {
          if(EFFECT_DEFS[n])EFFECT_DEFS[n].remove();
          delete activeEffects[n];
        }
      }
    }
    /* أعد تشغيل كل الـ damage intervals */
    if(activeEffects["bleeding"]&&!bleedInterval){
      let dps=getBleedDPS(bleedLevel);
      bleedInterval=setInterval(()=>{if(paused)return;if(!activeEffects["bleeding"]){clearInterval(bleedInterval);bleedInterval=null;return;}hp-=dps;ludki(`🩸 Bleeding ${getRoman(bleedLevel)}`,`−${dps} HP/s`,"damage");playSound(sounds.bleed);if(hp<=0)triggerDeath("Bled out");drawWorld();},1000);
    }
    if(activeEffects["poison"]&&!poisonInterval){
      let dps=getPoisonDPS(poisonLevel);
      poisonInterval=setInterval(()=>{if(paused)return;if(!activeEffects["poison"]){clearInterval(poisonInterval);poisonInterval=null;return;}hp-=dps;ludki(`☠️ Poison ${getRoman(poisonLevel)}`,`−${dps} HP/s`,"damage");if(hp<=0)triggerDeath("Poisoned");drawWorld();},1000);
    }
    if(activeEffects["burning"]&&!burningInterval){
      let dps=getBurnDPS(burnLevel);
      burningInterval=setInterval(()=>{if(paused)return;if(!activeEffects["burning"]){clearInterval(burningInterval);burningInterval=null;return;}hp-=dps;ludki(`🔥 Burning ${getRoman(burnLevel)}`,`−${dps} HP/2s`,"damage");playSound(sounds.burn);if(hp<=0)triggerDeath("Burned");drawWorld();},2000);
    }
    if(activeEffects["frost"]&&!frostInterval){
      let dps=getFrostDPS(frostLevel);
      frostInterval=setInterval(()=>{if(paused)return;if(!activeEffects["frost"]){clearInterval(frostInterval);frostInterval=null;return;}hp-=dps;ludki(`❄️ Frost ${getRoman(frostLevel)}`,`−${dps} HP/s`,"damage");if(hp<=0)triggerDeath("Frozen");drawWorld();},1000);
    }
    if(activeEffects["corruption"]&&!corruptInterval){
      let dps=getCorruptDPS(corruptLevel);
      corruptInterval=setInterval(()=>{if(paused)return;if(!activeEffects["corruption"]){clearInterval(corruptInterval);corruptInterval=null;return;}hp-=dps;ludki(`🟣 Corruption ${getRoman(corruptLevel)}`,`−${dps} HP/s`,"damage");if(hp<=0)triggerDeath("Corrupted");drawWorld();},1000);
    }
    /* أعد تشغيل hallu interval إن وجد */
    let halluLevel=activeEffects["hallucinationI"]?1:activeEffects["hallucinationII"]?2:activeEffects["hallucinationIII"]?3:0;
    if(halluLevel>0&&!halluInterval) startHallucination(halluLevel);
    if(currentChase)playMonsterMusic(currentChase,closestDistCache||99);else resumeBg();
    window._gameLoop=setInterval(gameLoop,500);
    if(menu)menu.style.display="none";
    if(btn)btn.innerHTML='<i class="fas fa-pause"></i>';
  }
}

document.addEventListener("keydown",e=>{
  if(e.repeat&&!activeEffects["speed"])return;
  if(e.key==="Escape"){togglePause();return;}
  if(paused)return;
  let dx=0,dy=0;
  if(e.key==="ArrowUp"||e.key==="w"||e.key==="W")dy=-1;
  else if(e.key==="ArrowDown"||e.key==="s"||e.key==="S")dy=1;
  else if(e.key==="ArrowLeft"||e.key==="a"||e.key==="A")dx=-1;
  else if(e.key==="ArrowRight"||e.key==="d"||e.key==="D")dx=1;
  else return;
  if(activeEffects["speed"]){startSpeedHold(dx,dy);return;}
  let nx=player.x+dx,ny=player.y+dy;
  if(nx<0||ny<0||nx>=W||ny>=H)return;
  if(world[ny][nx]==="tree"&&!ghostMode)return;
  if(world[ny][nx]==="spike")return; /* spikes are impassable */
  player.x=nx;player.y=ny;
  playSoundOnce(sounds.walk);updateBurningTimer();handleCell(nx,ny);drawWorld();
});
document.addEventListener("keyup",e=>{
  if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","w","a","s","d","W","A","S","D"].includes(e.key)){
    sounds.walk.pause();sounds.walk.currentTime=0;clearInterval(speedHoldInterval);speedHoldInterval=null;
  }
});

/* ══ MOBILE CONTROLS ══ */
function movePlayer(dx,dy){
  if(paused)return;
  let nx=player.x+dx,ny=player.y+dy;
  if(nx<0||ny<0||nx>=W||ny>=H)return;
  if(world[ny][nx]==="tree"&&!ghostMode)return;
  if(world[ny][nx]==="spike")return;
  player.x=nx;player.y=ny;
  playSoundOnce(sounds.walk);updateBurningTimer();handleCell(nx,ny);drawWorld();
}
let mobileHoldInterval=null;
function startMobileHold(dx,dy){
  if(paused)return;
  movePlayer(dx,dy);
  if(mobileHoldInterval)return;
  /* حركة مستمرة أثناء الضغط المطوّل */
  mobileHoldInterval=setInterval(()=>{
    if(paused){stopMobileHold();return;}
    movePlayer(dx,dy);
  },activeEffects["speed"]?150:220);
}
function stopMobileHold(){clearInterval(mobileHoldInterval);mobileHoldInterval=null;sounds.walk.pause();sounds.walk.currentTime=0;}
function setupMobileControls(){
  /* منع سكرول الصفحة تماماً */
  document.body.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
  
  const map={'btn-up':{dx:0,dy:-1},'btn-down':{dx:0,dy:1},'btn-left':{dx:-1,dy:0},'btn-right':{dx:1,dy:0}};
  Object.entries(map).forEach(([id,{dx,dy}])=>{
    const btn=document.getElementById(id);
    if(!btn)return;
    btn.setAttribute('tabindex','-1');
    btn.style.cssText+=';-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;touch-action:none;';
    
    btn.ontouchstart=e=>{
      e.preventDefault();
      if(!paused) startMobileHold(dx,dy);
      return false;
    };
    btn.ontouchend=e=>{
      e.preventDefault();
      stopMobileHold();
      return false;
    };
    btn.ontouchcancel=e=>{
      e.preventDefault();
      stopMobileHold();
      return false;
    };
    btn.onmousedown=e=>{e.preventDefault();if(!paused)startMobileHold(dx,dy);};
    btn.onmouseup=()=>stopMobileHold();
    btn.onmouseleave=()=>stopMobileHold();
    btn.oncontextmenu=e=>e.preventDefault();
  });
  
  const pauseBtn=document.getElementById('btn-pause');
  if(pauseBtn){
    pauseBtn.style.cssText+=';-webkit-tap-highlight-color:transparent;touch-action:none;';
    pauseBtn.ontouchstart=e=>{e.preventDefault();togglePause();return false;};
    pauseBtn.onclick=e=>{e.preventDefault();togglePause();};
  }
}

/* ══ MONSTERS ══ */
function moveMonsters(){
  if(paused)return;
  let closestMonster=null,closestDist=Infinity;closestDistCache=Infinity;
  monsters.forEach(m=>{let d=Math.abs(m.x-player.x)+Math.abs(m.y-player.y);if(d<closestDist){closestDist=d;closestMonster=m;closestDistCache=d;}});
  /* شغل موسيقى كل وحش قريب */
  let anyChase=false;
  monsters.forEach(m=>{
    let d=Math.abs(m.x-player.x)+Math.abs(m.y-player.y);
    if(d<=14){playMonsterMusic(m.type,d);anyChase=true;}
  });
  let newState=closestDist<=14?closestMonster?.type:null;
  if(newState){currentChase=newState;}
  else if(currentChase!==null&&!anyChase){stopChase();resumeBg();currentChase=null;}
  if(freezeMonsters)return;
  monsters.forEach(m=>{if(m.cd1>0)m.cd1--;if(m.cd2>0)m.cd2--;if(m.cd3>0)m.cd3--;});
  monsters.forEach(m=>{
    let dist=Math.abs(m.x-player.x)+Math.abs(m.y-player.y);
    if(m.type==="fire"){if(dist<=6)flameSurge(m);if(dist<=8)fireFireball(m);}
    if(m.type==="ice"){if(dist<=6)iceStorm(m);if(dist<=8)fireIceBolt(m);}
    if(m.type==="corruption"){
      if(dist<=30)corruptXray(m);
      if(dist<=12)corruptSpikes(m);
      if(dist<=8)corruptTrap(m);
    }
    if(m.type==="infected"){
      if(dist<=15)infectedRush(m);
      if(dist<=10)infectedVoidStar(m);
      if(dist<=20)infectedTeleport(m);
      /* Rush timer */
      if(m.rushing){
        m.rushTimer--;
        if(m.rushTimer<=0){m.rushing=false;}
      }
    }
  });
  monsters.forEach(m=>{
    /* الوحش الـ Corruption يخترق الـ spikes - الكل يمشي علي traps بدون تأثير */
    let basePassable=["empty","med","medkit","energy","question","freeze","poison_item","bandage","gold","copper","silver","diamond","iron","obsidian","firezone","icezone","lava","scorch","icescorch","trap","voidzone","voidstar"];
    let passable=m.type==="corruption"?[...basePassable,"spike"]:basePassable;

    /* X-Ray: لو الوحش فاسد ونشط يتجه مباشرة للاعب حتى من بعيد */
    let targetX=player.x,targetY=player.y;
    let moves=[{x:m.x+1,y:m.y},{x:m.x-1,y:m.y},{x:m.x,y:m.y+1},{x:m.x,y:m.y-1}]
      .filter(o=>o.x>=0&&o.y>=0&&o.x<W&&o.y<H&&passable.includes(world[o.y][o.x]));
    moves.sort((a,b)=>(Math.abs(a.x-targetX)+Math.abs(a.y-targetY))-(Math.abs(b.x-targetX)+Math.abs(b.y-targetY)));
    if(moves[0]){
      m.x=moves[0].x;m.y=moves[0].y;
      /* Rush: خطوة إضافية */
      if(m.type==="infected"&&m.rushing){
        let moves2=[{x:m.x+1,y:m.y},{x:m.x-1,y:m.y},{x:m.x,y:m.y+1},{x:m.x,y:m.y-1}]
          .filter(o=>o.x>=0&&o.y>=0&&o.x<W&&o.y<H&&passable.includes(world[o.y][o.x]));
        moves2.sort((a,b)=>(Math.abs(a.x-player.x)+Math.abs(a.y-player.y))-(Math.abs(b.x-player.x)+Math.abs(b.y-player.y)));
        if(moves2[0]){m.x=moves2[0].x;m.y=moves2[0].y;}
      }
    }

    if(m.x===player.x&&m.y===player.y&&!shield&&!magicShieldActive&&!invincibleMode&&!hitCooldown){
      if(magicShieldActive){
        ludki("🔮 Blocked!","Magic Shield absorbed!","collect");
        clearTimeout(activeEffects["magicShield"]?.timer);delete activeEffects["magicShield"];EFFECT_DEFS.magicShield.remove();return;
      }
      let baseDmg=m.type==="fire"?17:m.type==="corruption"?22:m.type==="infected"?26:20;
      let dmgReduction=strengthLevel===3?0.2:strengthLevel===2?0.28:0.35;
let dmg=weaknessActive?baseDmg*2:strengthActive?Math.floor(baseDmg*dmgReduction):baseDmg;
      hp-=dmg;hitCooldown=true;setTimeout(()=>hitCooldown=false,1000);
      ludki("HIT",`−${dmg} HP`,"damage");playSound(sounds.hit);
      if(m.type==="fire")startBurning();
      else if(m.type==="ice")startFrost(1);
      else if(m.type==="corruption")startCorruption(1);
      else if(m.type==="infected"){
        startHallucination(m.rushing?2:1);
        playSound(sounds.hallucination_sfx||sounds.hit);
      }
      else startBleeding();
      if(hp<=0)triggerDeath(`Killed by ${m.type==="fire"?"🔴 Fire":m.type==="ice"?"🔵 Ice":m.type==="corruption"?"🟣 Corruption":"👹"} Monster`);
    }
  });
}

/* ══ WIN ══ */
function checkWin(){
  if(paused||levelCleared)return;
  let done=true;for(let k in itemTarget)if((itemCollected[k]||0)<itemTarget[k]){done=false;break;}
  if(done){
    levelCleared=true;stage++;
    ludki("LEVEL COMPLETE","→ Level "+stage,"level");playSound(sounds.level);
    stopAllMusic();currentChase=null;
    setTimeout(()=>{createWorld();placeItems();spawnMonsters();drawWorld();levelCleared=false;playRandomBg();},1200);
  }
}

    poison:(l)=>{poisonLevel=Math.min(3,l);poisonHitCount=l;EFFECT_DEFS["poison"].label=`Poison ${getRoman(l)}`;let dps=getPoisonDPS(l);clearInterval(poisonInterval);poisonInterval=setInterval(()=>{if(paused)return;hp-=dps;if(hp<=0)triggerDeath("Poisoned");drawWorld();},1000);activeEffects["poison"]={endTime:Date.now()+dur,timer:setTimeout(()=>{clearInterval(poisonInterval);poisonInterval=null;poisonLevel=0;delete activeEffects["poison"];drawHud();},dur)};drawHud();},
    burning:(l)=>{burnLevel=Math.min(3,l);EFFECT_DEFS["burning"].label=`Burning ${getRoman(l)}`;let dps=getBurnDPS(l);clearInterval(burningInterval);burningInterval=setInterval(()=>{if(paused)return;hp-=dps;if(hp<=0)triggerDeath("Burned");drawWorld();},2000);activeEffects["burning"]={endTime:Date.now()+dur,timer:setTimeout(()=>{clearInterval(burningInterval);burningInterval=null;burnLevel=0;delete activeEffects["burning"];drawHud();},dur)};drawHud();},
    frost:(l)=>{frostLevel=Math.min(3,l);EFFECT_DEFS["frost"].label=`Frost ${getRoman(l)}`;let dps=getFrostDPS(l);clearInterval(frostInterval);frostInterval=setInterval(()=>{if(paused)return;hp-=dps;if(hp<=0)triggerDeath("Frozen");drawWorld();},1000);activeEffects["frost"]={endTime:Date.now()+dur,timer:setTimeout(()=>{clearInterval(frostInterval);frostInterval=null;frostLevel=0;delete activeEffects["frost"];drawHud();},dur)};drawHud();},
    corruption:(l)=>{corruptLevel=Math.min(3,l);corruptHitCount=l;EFFECT_DEFS["corruption"].label=`Corruption ${getRoman(l)}`;let dps=getCorruptDPS(l);clearInterval(corruptInterval);corruptInterval=setInterval(()=>{if(paused)return;hp-=dps;if(hp<=0)triggerDeath("Corrupted");drawWorld();},1000);activeEffects["corruption"]={endTime:Date.now()+dur,timer:setTimeout(()=>{clearInterval(corruptInterval);corruptInterval=null;corruptLevel=0;delete activeEffects["corruption"];drawHud();},dur)};drawHud();}
  };
  if(level&&lvlMap[name]){lvlMap[name](level);console.log(`%c✅ ${name} ${getRoman(level)} — ${durationSec}s`,"color:lime;font-size:14px");return;}
  EFFECT_DEFS[name].apply();activeEffects[name]={endTime:Date.now()+dur,timer:setTimeout(()=>{EFFECT_DEFS[name].remove();delete activeEffects[name];drawHud();},dur)};
  drawHud();console.log(`%c✅ ${name} — ${durationSec}s`,"color:lime;font-size:14px");
}
function removeEffect(name){if(activeEffects[name]){clearTimeout(activeEffects[name].timer);EFFECT_DEFS[name]?.remove();delete activeEffects[name];drawHud();}else console.log(`%c⚠️ ${name} not active`,"color:orange");}
function clearAllEffects(){for(let n in activeEffects){clearTimeout(activeEffects[n].timer);EFFECT_DEFS[n]?.remove();}activeEffects={};resetEffects();drawWorld();console.log("%c✅ All effects cleared","color:lime;font-size:14px");}
function maxEffects(){["speed","magicShield","magnet","reveal","fireProtection","ghost","lucky","invincible","strength","shield","freeze"].forEach(e=>giveEffect(e,60));console.log("%c✅ All good effects","color:gold;font-size:14px");}
function fillInventory(){for(let k in itemTarget)itemCollected[k]=itemTarget[k];drawWorld();console.log("%c✅ Inventory filled","color:lime;font-size:14px");}
function spawnItem(type,count=5){let p=0;for(let dy=-3;dy<=3&&p<count;dy++)for(let dx=-3;dx<=3&&p<count;dx++){let nx=player.x+dx,ny=player.y+dy;if(nx>=0&&ny>=0&&nx<W&&ny<H&&world[ny][nx]==="empty"){world[ny][nx]=type;p++;}}drawWorld();}
function killMonsters(){monsters=[];stopChase();currentChase=null;resumeBg();drawWorld();}
function spawnMonster(type="normal"){monsters.push({x:player.x+5,y:player.y+5,type,cd1:0,cd2:0,cd3:0,traps:0});drawWorld();}
function revealMap(){giveEffect("reveal",999);}
function teleport(x,y){if(x>=0&&y>=0&&x<W&&y<H){player.x=x;player.y=y;drawWorld();}else console.log("%c❌ Out of bounds","color:red");}
function noClip(){ghostMode=!ghostMode;if(!activeEffects["ghost"]){activeEffects["ghost"]={endTime:Date.now()+999999,timer:null};EFFECT_DEFS["ghost"].label="Ghost (Admin)";}drawHud();}
function setVision(n){vision=n;drawWorld();}
function clearTrees(){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]==="tree")world[y][x]="empty";drawWorld();}
function clearLava(){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]==="lava")world[y][x]="empty";drawWorld();}
function fillLava(){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]==="empty")world[y][x]="lava";world[player.y][player.x]="empty";drawWorld();}
function setCell(x,y,type){if(x>=0&&y>=0&&x<W&&y<H){world[y][x]=type;drawWorld();}else console.log("%c❌ Out of bounds","color:red");}
function getCell(x,y){if(x>=0&&y>=0&&x<W&&y<H)console.log(`%c📍 (${x},${y}) = ${world[y][x]}`,"color:cyan;font-size:14px");}
function whereAmI(){console.log(`%c📍 (${player.x},${player.y}) | Level:${stage} | HP:${hp}`,"color:cyan;font-size:14px");}
function listMonsters(){monsters.forEach((m,i)=>console.log(`%c👹 [${i}] ${m.type} (${m.x},${m.y})`,"color:cyan;font-size:12px"));}
function setMonsterPos(i,x,y){if(monsters[i]){monsters[i].x=x;monsters[i].y=y;drawWorld();}}
function freezeAllMonsters(){freezeMonsters=true;console.log("%c🧊 Frozen","color:#0af;font-size:14px");}
function unfreezeAllMonsters(){freezeMonsters=false;console.log("%c✅ Unfrozen","color:lime;font-size:14px");}
function setGameSpeed(ms=500){clearInterval(window._gameLoop);window._gameLoop=setInterval(gameLoop,ms);console.log(`%c✅ Speed = ${ms}ms`,"color:lime;font-size:14px");}
function pauseGame(){paused=true;stopAllMusic();clearInterval(window._gameLoop);window._gameLoop=null;}
function resumeGame(){paused=false;resumeBg();if(!window._gameLoop)window._gameLoop=setInterval(gameLoop,500);}
function resetLevel(){
  /* يعيد اللاعب لأول الـ level من غير تغيير المستوى */
  hp=100;clearAllEffects();stopAllMusic();currentChase=null;
  createWorld();placeItems();spawnMonsters();drawWorld();playRandomBg();
  if(!window._gameLoop)window._gameLoop=setInterval(gameLoop,500);
  const menu=document.getElementById("pauseMenu");
  if(menu)menu.style.display="none";
  paused=false;
  console.log("%c✅ Level Reset","color:lime;font-size:14px");
}
function resetGame(){stage=1;hp=100;clearAllEffects();stopAllMusic();currentChase=null;createWorld();placeItems();spawnMonsters();drawWorld();playRandomBg();if(!window._gameLoop)window._gameLoop=setInterval(gameLoop,500);const menu=document.getElementById("pauseMenu");if(menu)menu.style.display="none";paused=false;}
function setInvincible(on=true){invincibleMode=on;if(on){activeEffects["invincible"]={endTime:Date.now()+999999,timer:null};EFFECT_DEFS["invincible"].label="Invincible (∞)";}else{delete activeEffects["invincible"];invincibleMode=false;}drawHud();}
function setShield(on=true){shield=on;if(on)activeEffects["shield"]={endTime:Date.now()+999999,timer:null};else delete activeEffects["shield"];drawHud();}
function giveGold(n=10){itemCollected["gold"]=(itemCollected["gold"]||0)+n;drawWorld();}
function giveDiamond(n=5){itemCollected["diamond"]=(itemCollected["diamond"]||0)+n;drawWorld();}
function saveGame(){
  localStorage.setItem('survival_save',JSON.stringify({stage,hp,items:itemCollected,savedAt:new Date().toLocaleString()}));
  ludki("💾 Saved","Game saved!","collect");
  console.log("%c✅ Saved","color:lime;font-size:14px");
}
function loadGame(){
  let s=localStorage.getItem('survival_save');
  if(s){
    let d=JSON.parse(s);stage=d.stage;hp=Math.max(1,d.hp||100);itemCollected=d.items||{};
    createWorld();placeItems();spawnMonsters();drawWorld();
    ludki("📂 Loaded",`Level ${stage} loaded!`,"collect");
    console.log("%c✅ Loaded","color:lime;font-size:14px");
  }else console.log("%c⚠️ No save","color:orange");
}
function gameInfo(){console.log(`%c📊 Level:${stage} HP:${hp} Pos:(${player.x},${player.y}) Vision:${vision} Monsters:${monsters.length} Effects:[${Object.keys(activeEffects).join(",")||"none"}]`,"color:cyan;font-family:monospace;font-size:12px");}
function help(){console.log(`%c
🎮 ADMIN COMMANDS — اكتبها في Console (F12)
━━━━━━━━━━━━━━━━━━━━━━━━━━━━
reachLevel(n)              → انتقل لمستوى
setHP(n) | maxHP()         → HP
godMode() | die()          → حياة
giveEffect(name,sec,lvl?)  → تأثير (مثال: giveEffect("corruption",10,2))
clearAllEffects()          → امسح التأثيرات
maxEffects()               → كل الجيد
fillInventory()            → اجمع
spawnItem(type,n)          → ضع عناصر
killMonsters()             → اقتل الكل
spawnMonster(type)         → أضف وحش (normal/fire/ice/corruption)
teleport(x,y)             → انتقل
noClip()                   → اختراق الأشجار
revealMap()                → اكشف الخريطة
setVision(n)               → تحديد الرؤية

console.log("%c🎮 Final Survival Game Ready! — اكتب help()","color:gold;font-size:16px;font-weight:bold");

/* ══ RESPONSIVE RESIZE ══ */
function handleResize(){
  calcViewport();
  applyLayoutMode();
  drawWorld();
}

function applyLayoutMode(){
  const isMobile=window.innerWidth<=768;
  const hud=document.getElementById("hud");
  const gameSide=document.getElementById("gameSide");
  const gameWrapper=document.getElementById("gameWrapper");
  const mobileCtrl=document.getElementById("mobile-controls");
  
  if(isMobile){
    /* هاتف: HUD أسفل، ماب فوق */
    if(gameWrapper){gameWrapper.style.flexDirection="column";}
    if(hud){
      hud.style.width="100vw";hud.style.height="auto";hud.style.borderRight="none";
      hud.style.borderTop="2px solid #0f0";hud.style.order="2";hud.style.maxHeight="22vh";
      hud.style.overflowY="auto";
    }
    if(gameSide){gameSide.style.order="1";gameSide.style.width="100%";}
    if(mobileCtrl){mobileCtrl.style.display="flex";mobileCtrl.style.order="3";}
  } else {
    /* ديسكتوب/تابليت: HUD يسار، ماب يمين */
    if(gameWrapper){gameWrapper.style.flexDirection="row";}
    if(hud){
      let hudW=window.innerWidth>1200?190:160;
      hud.style.width=hudW+"px";hud.style.height="100vh";
      hud.style.borderRight="2px solid #0f0";hud.style.borderTop="none";
      hud.style.order="-1";hud.style.maxHeight="100vh";
    }
    if(gameSide){gameSide.style.order="0";gameSide.style.width="auto";}
    if(mobileCtrl){mobileCtrl.style.display="none";}
  }
}

window.addEventListener("resize",handleResize);
/* إظهار أزرار التحكم على أجهزة اللمس */
if('ontouchstart' in window || navigator.maxTouchPoints>0){
  const mc=document.getElementById("mobile-controls");
  if(mc) mc.style.display="flex";
}
applyLayoutMode();

/* ══ START ══ */
setupMobileControls();
createWorld();placeItems();spawnMonsters();drawWorld();
/* تشغيل صوت البداية عند أول تفاعل */
document.addEventListener("touchstart",unlockAudio,{once:true});
</script>
