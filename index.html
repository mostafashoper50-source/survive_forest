<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<title>Final Survival Game</title>
<style>
/* ══ VFX ══ */
#vfxOverlay{position:fixed;inset:0;pointer-events:none;z-index:9998;transition:background 0.3s;}
body.vfx-bleeding #vfxOverlay{background:radial-gradient(circle,transparent 50%,rgba(180,0,0,0.4) 100%);animation:vfxP 0.8s infinite alternate;}
body.vfx-poison   #vfxOverlay{background:radial-gradient(circle,transparent 50%,rgba(0,180,0,0.4) 100%);animation:vfxP 1.2s infinite alternate;}
body.vfx-burning  #vfxOverlay{background:radial-gradient(circle,transparent 50%,rgba(255,80,0,0.4) 100%);animation:vfxP 0.5s infinite alternate;}
body.vfx-frost    #vfxOverlay{background:radial-gradient(circle,transparent 55%,rgba(0,150,255,0.4) 100%);animation:vfxP 2s infinite alternate;}
body.vfx-blind    #vfxOverlay{background:rgba(0,0,0,0.6);}
body.vfx-weakness #vfxOverlay{background:radial-gradient(circle,transparent 40%,rgba(100,0,100,0.4) 100%);animation:vfxP 2s infinite alternate;}
body.vfx-corruption #vfxOverlay{background:radial-gradient(circle,transparent 40%,rgba(100,0,150,0.55) 100%);animation:vfxP 0.7s infinite alternate;}
body.vfx-infected #vfxOverlay{background:radial-gradient(circle,transparent 30%,rgba(150,80,0,0.5) 70%);animation:vfxP 0.4s infinite alternate;}
@keyframes vfxP{from{opacity:0.5;}to{opacity:1;}}

/* ══ PAGE ══ */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;height:100%;overflow:hidden;
  background:radial-gradient(circle,#0b3d0b,#000);
  display:flex;flex-direction:column;
  justify-content:flex-start;align-items:center;
  color:#cfffcc;font-family:Arial,sans-serif;
  position:fixed;touch-action:none;
}

/* ══ GAME WRAPPER ══ */
#gameWrapper{
  display:flex;flex-direction:row;
  align-items:flex-start;justify-content:center;
  width:100%;height:100%;
  overflow:hidden;
}

/* ══ GAME ══ */
#game{
  display:grid;gap:0;background:#021;
  padding:2px;border:2px solid lime;
  overflow:hidden;flex-shrink:0;
  box-sizing:border-box;z-index:5;
}
.cell{
  display:flex;justify-content:center;align-items:center;
  font-size:9px;line-height:1;overflow:hidden;
}

/* ══ HUD ══ */
#hud{
  width:190px;min-width:150px;height:100vh;
  background:rgba(0,0,0,0.92);
  padding:10px;border-right:2px solid #0f0;
  font-size:12px;box-sizing:border-box;
  z-index:100;overflow-y:auto;flex-shrink:0;
  order:-1;
}
.bar-wrap{background:#111;border-radius:4px;height:9px;margin-bottom:5px;overflow:hidden;}
.bar{height:9px;background:lime;transition:width 0.3s;border-radius:4px;}

/* ══ MOBILE CONTROLS ══ */
#mobile-controls{
  display:none;flex-direction:column;
  align-items:center;gap:6px;
  padding:4px 0;flex-shrink:0;z-index:110;
  user-select:none;width:100%;
}
.ctrl-row{display:flex;gap:10px;justify-content:center;}
.ctrl-btn{
  width:52px;height:52px;
  background:rgba(0,255,0,0.12);
  border:2px solid lime;color:lime;
  border-radius:50%;font-size:18px;
  display:flex;justify-content:center;align-items:center;
  touch-action:manipulation;-webkit-touch-callout:none;cursor:pointer;
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
}
.ctrl-btn:active{background:lime;color:#000;}
#btn-pause{border-radius:10px;width:44px;height:30px;font-size:12px;}

/* ══ PAUSE MENU ══ */
#pauseMenu{
  display:none;position:fixed;
  top:10px;left:10px;width:165px;
  background:rgba(0,8,0,0.97);
  border:2px solid lime;border-radius:12px;
  box-shadow:0 0 20px rgba(0,255,0,0.3);
  z-index:99998;flex-direction:column;
  align-items:center;gap:8px;padding:14px 10px;
}
#pauseMenu h2{color:lime;font-size:20px;margin-bottom:4px;}
#pauseInfo{color:#aaa;font-size:10px;text-align:center;line-height:1.5;margin-bottom:4px;}
.pmBtn{
  width:145px;padding:8px 0;border-radius:8px;
  cursor:pointer;font-size:13px;text-align:center;
  border:1.5px solid lime;background:rgba(0,40,0,0.8);color:#cfffcc;
}
.pmBtn:active{background:lime;color:#000;}
.pmBtn.red{border-color:#f44;background:rgba(40,0,0,0.8);}

/* ══ ALERTS ══ */
.game-alert{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  z-index:9999;opacity:0;pointer-events:none;transition:opacity 0.15s;
}
.game-alert.show{opacity:1;}
.alert-box{
  background:rgba(2,20,2,0.92);border:1.5px solid lime;
  padding:5px 14px;text-align:center;color:#cfffcc;
  border-radius:10px;box-shadow:0 0 14px rgba(0,255,0,0.3);white-space:nowrap;
}
.alert-box h2{margin:0;font-size:12px;}
.alert-box p{margin:2px 0 0;font-size:10px;}

/* ══ XRAY ALERT ══ */
#xrayAlert{
  display:none;position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(60,0,80,0.95);border:2px solid #a020f0;
  border-radius:12px;padding:14px 28px;text-align:center;
  z-index:9997;color:#d0a0ff;font-size:14px;
  box-shadow:0 0 30px rgba(160,32,240,0.6);
  animation:xrayP 0.6s infinite alternate;
}
@keyframes xrayP{from{box-shadow:0 0 20px rgba(160,32,240,0.4);}to{box-shadow:0 0 50px rgba(160,32,240,0.9);}}

/* ══ GAME OVER ══ */
#gameOverScreen{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.9);z-index:99999;
  justify-content:center;align-items:center;flex-direction:column;gap:14px;
}
#gameOverScreen.show{display:flex;}
#gameOverScreen h1{color:#f44;font-size:48px;text-shadow:0 0 30px #f00;animation:pulse 0.8s infinite alternate;}
#gameOverScreen p{color:#aaa;font-size:15px;}
#retryBtn{
  background:linear-gradient(145deg,#062b06,#021a02);
  border:2px solid lime;color:#cfffcc;
  font-size:18px;padding:10px 32px;border-radius:10px;cursor:pointer;
}
@keyframes pulse{from{text-shadow:0 0 20px #f00;}to{text-shadow:0 0 50px #f00,0 0 80px #f44;}}

/* Hallucination VFX */
body.vfx-hallucination #vfxOverlay{background:radial-gradient(circle,transparent 30%,rgba(80,0,120,0.35) 70%,rgba(120,0,80,0.45) 100%);animation:vfxP 1.5s infinite alternate;}
body.vfx-hallucination1 #game{animation:halluWave 2.5s ease-in-out infinite;}
@keyframes halluWave{
  0%,100%{transform:skewX(0deg) skewY(0deg);}
  20%{transform:skewX(1.5deg) skewY(0.4deg);}
  50%{transform:skewX(-1deg) skewY(-0.3deg);}
  75%{transform:skewX(0.8deg) skewY(0.3deg);}
}
@keyframes halluShake{
  0%,100%{transform:translate(0,0) rotate(0deg);}
  15%{transform:translate(-5px,4px) rotate(-1.5deg);}
  30%{transform:translate(5px,-4px) rotate(1.5deg);}
  45%{transform:translate(-3px,5px) rotate(-0.8deg);}
  60%{transform:translate(4px,-3px) rotate(1deg);}
  80%{transform:translate(-2px,3px) rotate(-0.5deg);}
}
.hallucination-alert{
  position:fixed;background:rgba(60,0,80,0.96);border:2px solid #a020f0;
  border-radius:10px;padding:8px 12px;color:#f0c;font-size:12px;font-weight:bold;
  z-index:99990;text-align:center;animation:halluShake 0.35s infinite;pointer-events:none;
  box-shadow:0 0 24px rgba(160,32,240,0.9);
}

/* ══ RESPONSIVE ══ */
@media (max-width:768px){
  #gameWrapper{flex-direction:column;align-items:center;justify-content:flex-start;height:auto;}
  #hud{
    width:100vw;height:auto;min-height:0;
    border-left:none;border-top:2px solid #0f0;
    padding:6px 10px;
    display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;
    overflow-y:visible;flex-shrink:0;
  }
  #hud-main{min-width:110px;flex:0 0 auto;}
  #hud-effects{flex:1;min-width:120px;max-height:80px;overflow-y:auto;}
  #hud-items{flex:1;min-width:90px;}
  #mobile-controls{display:flex !important;}
}
@media (min-width:769px) and (max-width:1200px){
  #hud{width:175px;font-size:11px;}
}
</style>
</head>
<body>

<div id="gameWrapper">
<!-- HUD -->
<div id="hud">
  <div id="hud-main">
    <div style="font-size:13px;font-weight:bold;color:lime;margin-bottom:4px">🏆 Level: <span id="level">1</span></div>
    <div style="font-size:11px;margin-bottom:2px">❤️ HP</div>
    <div class="bar-wrap"><div class="bar" id="hpBar"></div></div>
    <div id="boostBarWrap" class="bar-wrap" style="display:none;margin-top:2px;background:rgba(255,0,170,0.15);"><div id="boostBar" style="height:9px;background:linear-gradient(90deg,#f0a,#f5f);transition:width 0.3s;border-radius:4px;"></div></div>
  </div>
  <div id="hud-effects"><div id="effectsHud"></div></div>
  <hr style="border-color:#0f04;margin:4px 0;width:100%">
  <div id="hud-items"><div id="itemsHud"></div></div>
</div>
<div id="gameSide" style="display:flex;flex-direction:column;align-items:center;justify-content:flex-start;flex:1;overflow:hidden;">
<div id="game"></div>

<!-- Mobile Controls -->
<div id="mobile-controls">
  <div class="ctrl-row">
    <button class="ctrl-btn" id="btn-pause"><i class="fas fa-pause"></i></button>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn" id="btn-up"><i class="fas fa-chevron-up"></i></button>
  </div>
  <div class="ctrl-row">
    <button class="ctrl-btn" id="btn-left"><i class="fas fa-chevron-left"></i></button>
    <button class="ctrl-btn" id="btn-down"><i class="fas fa-chevron-down"></i></button>
    <button class="ctrl-btn" id="btn-right"><i class="fas fa-chevron-right"></i></button>
  </div>
</div>
</div><!-- end gameSide -->
</div><!-- end gameWrapper -->

<div id="vfxOverlay"></div>

<!-- Pause Menu -->
<div id="pauseMenu">
  <h2>⏸️ PAUSED</h2>
  <div id="pauseInfo"></div>
  <button class="pmBtn" onclick="togglePause()">▶️ Resume</button>
  <button class="pmBtn" onclick="resetLevel()">🔁 Reset Level</button>
  <button class="pmBtn red" onclick="resetGame()">🔄 Reset Game</button>
</div>

<!-- XRay Alert -->
<div id="xrayAlert">
  <div style="font-size:20px">👁️</div>
  <b>CORRUPTED MONSTER</b><br>
  <span style="font-size:11px">Seeing you!</span><br>
  <span id="xrayCountdown" style="font-size:22px;color:#f0c;font-weight:bold">4</span>
</div>

<div id="gameOverScreen">
  <h1>💀 GAME OVER</h1>
  <p id="gameOverReason"></p>
  <button id="retryBtn">🔄 RETRY</button>
</div>

<div id="gameAlert" class="game-alert">
  <div class="alert-box">
    <h2 id="alertTitle"></h2>
    <p id="alertText"></p>
  </div>
</div>

<script>
const W=60, H=120;
let VIEW_W=60, VIEW_H=30, CELL_SIZE=14;

function calcViewport(){
  const sw=window.innerWidth, sh=window.innerHeight;
  const isMobile=sw<=768;
  const isTablet=sw>768&&sw<=1200;
  if(isMobile){
    let hudH=Math.min(90,sh*0.12);
    let ctrlH=Math.min(140,sh*0.22);
    let availW=sw-8;
    let availH=sh-hudH-ctrlH-16;
    CELL_SIZE=Math.max(8,Math.min(13,Math.floor(availW/W)));
    VIEW_W=Math.min(W,Math.floor(availW/CELL_SIZE));
    VIEW_H=Math.min(H,Math.floor(availH/CELL_SIZE));
  } else if(isTablet){
    let availW=sw-180-8;
    let availH=sh-20;
    CELL_SIZE=Math.max(10,Math.min(14,Math.floor(availW/W)));
    VIEW_W=Math.min(W,Math.floor(availW/CELL_SIZE));
    VIEW_H=Math.min(H,Math.floor(availH/CELL_SIZE));
  } else {
    let availW=sw-220;
    let availH=sh-20;
    CELL_SIZE=Math.max(12,Math.min(16,Math.floor(Math.min(availW/W,availH/36))));
    VIEW_W=Math.min(W,Math.floor(availW/CELL_SIZE));
    VIEW_H=Math.min(H,Math.floor(availH/CELL_SIZE));
  }
}
calcViewport();

const game       = document.getElementById("game");
const levelEl    = document.getElementById("level");
const hpBar      = document.getElementById("hpBar");
const itemsHud   = document.getElementById("itemsHud");
const effectsHudEl = document.getElementById("effectsHud");

/* ══ MONSTER IMAGES ══ */
const monsterImgs={
  normal:"",
  fire:"./IMAGES/9e78383488055714c4d2581476472990.JPG",
  ice:"./IMAGES/3f2375a8e947bf2d2a32eb394b74a094.JPG",
  corruption:"./IMAGES/e14e65d09a00866ba47f7c3ae020f6b8.jpg",
  infected:"./IMAGES/3c5e2c1b344c4bebaddc18ec1065d0f9.jpg",
  shawarmaElHeaween:"./IMAGES/shawarma.jpg",
  jeffreyEpstein:"./IMAGES/jeffrey.jpg",
  lary:"./IMAGES/lary.jpg",
  jobApplication:"./IMAGES/job.jpg",
  hitler:"./IMAGES/hitler.jpg"
};

/* ══ STATE ══ */
let world=[], player={x:1,y:1}, monsters=[];
let stage=1, hp=100, maxHp=100, vision=5;
let shield=false, paused=false;
let hitCooldown=false, levelCleared=false;
let activeEffects={};
let stepSize=1, magicShieldActive=false, magnetActive=false, strengthActive=false;
let speedLevel=0, speedStepsLeft=0, speedHoldActive=false;
let onLava=false;
let bleedLevel=0, bleedInterval=null, bleedHitCount=0;
let poisonLevel=0, poisonHitCount=0, poisonInterval=null;
let frostLevel=0, frostHitCount=0, frostInterval=null;
let burnLevel=0, burningInterval=null;
let corruptLevel=0, corruptHitCount=0, corruptInterval=null;
let lavaImmune=false, ghostMode=false, luckyMode=false;
let invincibleMode=false, weaknessActive=false, freezeMonsters=false;
let currentChase=null, closestDistCache=99;
let xrayActive=false;
let pausedAt=0;
let fireProtectionActive=false;
let healUpInterval=null;
let healthBoost=0, healthBoostMax=0;
let strengthLevel=1;
let activeTraps=[];
let halluFakeItems=[];
let halluFakeMonsters=[];
let halluInterval=null;

/* ══ EFFECT DEFS ══ */
const EFFECT_DEFS={
  freeze:{emoji:"🧊",label:"Freeze",good:true,apply:()=>{freezeMonsters=true;},remove:()=>{freezeMonsters=false;}},
  burning:{emoji:"🔥",label:"Burning",good:false,apply:()=>{},remove:()=>{clearInterval(burningInterval);burningInterval=null;}},
  corruption:{emoji:"🟣",label:"Corruption",good:false,apply:()=>{},remove:()=>{clearInterval(corruptInterval);corruptInterval=null;corruptLevel=0;corruptHitCount=0;}},
  speed:{emoji:"⚡",label:"Speed",good:true,apply:()=>{speedHoldActive=false;},remove:()=>{speedLevel=0;speedStepsLeft=0;stepSize=1;}},
  magicShield:{emoji:"🔮",label:"Magic Shield",good:true,apply:()=>{magicShieldActive=true;},remove:()=>{magicShieldActive=false;}},
  magnet:{emoji:"🧲",label:"Magnet",good:true,apply:()=>{magnetActive=true;},remove:()=>{magnetActive=false;}},
  reveal:{emoji:"🗺️",label:"Reveal",good:true,apply:()=>{vision=99;},remove:()=>{vision=5;}},
  fireProtection:{emoji:"🔥🛡️",label:"Fire Protection",good:true,apply:()=>{lavaImmune=true;fireProtectionActive=true;},remove:()=>{lavaImmune=false;fireProtectionActive=false;}},
  ghost:{emoji:"👻",label:"Ghost",good:true,apply:()=>{ghostMode=true;},remove:()=>{ghostMode=false;}},
  lucky:{emoji:"⭐",label:"Lucky",good:true,apply:()=>{luckyMode=true;},remove:()=>{luckyMode=false;}},
  invincible:{emoji:"💫",label:"Invincible",good:true,apply:()=>{invincibleMode=true;},remove:()=>{invincibleMode=false;}},
  weakness:{emoji:"💀",label:"Weakness",good:false,apply:()=>{weaknessActive=true;},remove:()=>{weaknessActive=false;}},
  weaknessII:{emoji:"💀💀",label:"Weakness II",good:false,apply:()=>{weaknessActive=true;},remove:()=>{weaknessActive=false;}},
  weaknessIII:{emoji:"💀💀💀",label:"Weakness III",good:false,apply:()=>{weaknessActive=true;},remove:()=>{weaknessActive=false;}},
  shield:{emoji:"🛡️",label:"Shield",good:true,apply:()=>{shield=true;},remove:()=>{shield=false;}},
  strength:{emoji:"💪",label:"Strength I",good:true,apply:()=>{strengthActive=true;strengthLevel=1;},remove:()=>{strengthActive=false;strengthLevel=1;}},
  blind:{emoji:"🌫️",label:"Blind",good:false,apply:()=>{vision=2;},remove:()=>{vision=5;}},
  blindII:{emoji:"🌫️🌫️",label:"Blind II",good:false,apply:()=>{vision=1;},remove:()=>{vision=5;}},
  blindIII:{emoji:"🌫️🌫️🌫️",label:"Blind III",good:false,apply:()=>{vision=0;},remove:()=>{vision=5;}},
  frost:{emoji:"❄️",label:"Frost",good:false,apply:()=>{},remove:()=>{clearInterval(frostInterval);frostInterval=null;frostLevel=0;frostHitCount=0;}},
  bleeding:{emoji:"🩸",label:"Bleeding",good:false,apply:()=>{},remove:()=>{clearInterval(bleedInterval);bleedInterval=null;bleedLevel=0;bleedHitCount=0;}},
  bleedingI:{emoji:"🩸",label:"Bleeding I",good:false,apply:()=>{},remove:()=>{clearInterval(bleedInterval);bleedInterval=null;bleedLevel=0;bleedHitCount=0;}},
  poison:{emoji:"☠️",label:"Poison",good:false,apply:()=>{},remove:()=>{clearInterval(poisonInterval);poisonInterval=null;poisonLevel=0;poisonHitCount=0;}},
  regenI:{emoji:"💚",label:"Regeneration I",good:true,apply:()=>{},remove:()=>{clearInterval(healUpInterval);healUpInterval=null;}},
  regenII:{emoji:"💚💚",label:"Regeneration II",good:true,apply:()=>{},remove:()=>{clearInterval(healUpInterval);healUpInterval=null;}},
  strengthII:{emoji:"💪💪",label:"Strength II",good:true,apply:()=>{strengthActive=true;strengthLevel=2;},remove:()=>{strengthActive=false;strengthLevel=1;}},
  strengthIII:{emoji:"💪💪💪",label:"Strength III",good:true,apply:()=>{strengthActive=true;strengthLevel=3;},remove:()=>{strengthActive=false;strengthLevel=1;}},
  healthBoostI:{emoji:"❤️+",label:"Health Boost I",good:true,apply:()=>{healthBoost=25;healthBoostMax=25;maxHp=100+25;},remove:()=>{healthBoost=0;healthBoostMax=0;maxHp=100;}},
  healthBoostII:{emoji:"❤️++",label:"Health Boost II",good:true,apply:()=>{healthBoost=50;healthBoostMax=50;maxHp=100+50;},remove:()=>{healthBoost=0;healthBoostMax=0;maxHp=100;}},
  healthBoostIII:{emoji:"❤️+++",label:"Health Boost III",good:true,apply:()=>{healthBoost=100;healthBoostMax=100;maxHp=100+100;},remove:()=>{healthBoost=0;healthBoostMax=0;maxHp=100;}},
  infected:{emoji:"🦠",label:"Infected",good:false,apply:()=>{document.body.classList.add("vfx-infected");},remove:()=>{document.body.classList.remove("vfx-infected");}},
  infectedII:{emoji:"🦠🦠",label:"Infected II",good:false,apply:()=>{document.body.classList.add("vfx-infected");},remove:()=>{document.body.classList.remove("vfx-infected");}},
  infectedIII:{emoji:"🦠🦠🦠",label:"Infected III",good:false,apply:()=>{document.body.classList.add("vfx-infected");},remove:()=>{document.body.classList.remove("vfx-infected");}}
};

const QUESTION_EFFECTS=["weakness","magicShield","blind","magnet","reveal","fireProtection","ghost","lucky","invincible","strengthIII","healthBoostI","healthBoostII","healthBoostIII"];

/* ══ HELPERS ══ */
function getRoman(l){return l===1?"I":l===2?"II":"III";}
function getBleedDPS(l){return l===1?2:l===2?4:7;}
function getPoisonDPS(l){return l===1?3:l===2?6:10;}
function getBurnDPS(l){return l===1?3:l===2?5:8;}
function getFrostDPS(l){return l===1?2:l===2?4:7;}
function getCorruptDPS(l){return l===1?2:l===2?5:9;}
function getLevelDur(l){return l===1?10000:l===2?8000:6000;}

/* ══ EFFECT OPPOSITION MATH ══ */
const EFFECT_OPP_LEVEL={"strength":1,"strengthII":2,"strengthIII":3,"weakness":1,"blind":1,"reveal":1};
const EFFECT_OPP_PAIRS=[
  {a:["strength","strengthII","strengthIII"], b:["weakness"]},
  {a:["blind"], b:["reveal"]}
];
const STRENGTH_BY_LVL=["","strength","strengthII","strengthIII"];

function resolveOpposing(name){
  for(let pair of EFFECT_OPP_PAIRS){
    let inA=pair.a.includes(name), inB=pair.b.includes(name);
    if(!inA&&!inB) continue;
    let myGroup=inA?pair.a:pair.b, oppGroup=inA?pair.b:pair.a;
    let myLvl=EFFECT_OPP_LEVEL[name]||1;
    let oppActive=oppGroup.find(n=>activeEffects[n]);
    if(!oppActive) continue;
    let oppLvl=EFFECT_OPP_LEVEL[oppActive]||1;
    [...myGroup,...oppGroup].forEach(n=>{
      if(activeEffects[n]){clearTimeout(activeEffects[n].timer);if(EFFECT_DEFS[n])EFFECT_DEFS[n].remove();delete activeEffects[n];}
    });
    let diff=myLvl-oppLvl;
    if(diff>0){
      let winner=pair.a.includes(name)?STRENGTH_BY_LVL[diff]:null;
      if(winner&&EFFECT_DEFS[winner]) applyEffect(winner);
      else if(!pair.a.includes(name)&&diff===1) applyEffect("weakness");
    } else if(diff<0){
      let winner=pair.a.includes(oppActive)?STRENGTH_BY_LVL[-diff]:null;
      if(winner&&EFFECT_DEFS[winner]) applyEffect(winner);
      else if(!pair.a.includes(oppActive)&&-diff===1) applyEffect("weakness");
    }
    drawHud();
    return true;
  }
  return false;
}

/* ══ APPLY EFFECT ══ */
function applyEffect(name){
  const def=EFFECT_DEFS[name]; if(!def)return;
  if(activeEffects[name]){clearTimeout(activeEffects[name].timer);def.remove();}
  const goodDur={freeze:7000,speed:8000,magicShield:10000,magnet:12000,reveal:9000,fireProtection:15000,ghost:8000,lucky:10000,invincible:7000,strength:10000,shield:8000,regenI:6000,regenII:8000,healthBoostI:20000,healthBoostII:25000,healthBoostIII:30000};
  const badDur={weakness:10000,blind:5000,poison:8000,bleeding:10000,burning:7000,infected:8000,infectedII:10000,infectedIII:15000,weaknessII:10000,weaknessIII:10000,blindII:6000,blindIII:8000,bleedingI:10000};
  let dur=def.good?(goodDur[name]||7000):(badDur[name]||5000);
  def.apply();
  activeEffects[name]={endTime:Date.now()+dur,timer:setTimeout(()=>{def.remove();delete activeEffects[name];drawHud();},dur)};
  if(!resolveOpposing(name)){
    ludki((def.good?"✅ ":"⚠️ ")+def.label,def.good?"Active!":"Watch out!",def.good?"collect":"damage");
    drawHud();
  }
}

const sounds={
  start:new Audio("./sounds/start.mp3"),
  bg1:new Audio("./sounds/bg1.m4a"),bg2:new Audio("./sounds/bg2.m4a"),bg3:new Audio("./sounds/bg3.m4a"),

/* ══ ADMIN CONSOLE ══ */
window.spawnMonster=function(type){
  if(!monsters)monsters=[];
  let cells=getReachableCells();
  if(cells.length===0){ludki("⚠️ Spawn Error","No space to spawn!","damage");return;}

  let m={x:best.x,y:best.y,type,cd1:0,cd2:0:cd3:0,cd4:0,cd5:0,disappearActive:false,noclipActive:false,brickThrow:0,supporters:0,armyActive:false,nukeActive:false,laryAngry:false,jobMinions:0};

};

/* ══ ALERT ══ */
let alertTimer;
function ludki(title,text,type="normal"){
  document.getElementById("alertTitle").textContent=title;
  document.getElementById("alertText").textContent=text;
  const box=document.getElementById("gameAlert");
  box.classList.add("show");clearTimeout(alertTimer);
  if(type==="pause")return;
  alertTimer=setTimeout(()=>box.classList.remove("show"),(type==="level"||type==="gameover")?1200:300);
}

/* ══ ITEMS ══ */
const itemEmoji={gold:"💰",copper:"🟤",silver:"⚪",diamond:"💎",iron:"⛓️",obsidian:"🟣",med:"🧪",medkit:"🧰",energy:"🥤",question:"❓",freeze:"🧊",poison_item:"☠️",bandage:"🩹"};
const itemName={gold:"Gold",copper:"Copper",silver:"Silver",diamond:"Diamond",iron:"Iron",obsidian:"Obsidian"};
let itemTarget={},itemCollected={};

/* ══ WORLD ══ */
function floodFill(wx,wy){
  let v=new Set(),q=[[wx,wy]];v.add(wy*W+wx);
  while(q.length){let[cx,cy]=q.shift();for(let[dx,dy] of[[1,0],[-1,0],[0,1],[0,-1]]){let nx=cx+dx,ny=cy+dy;if(nx>=0&&ny>=0&&nx<W&&ny<H&&!v.has(ny*W+nx)&&world[ny][nx]!=="tree"){v.add(ny*W+nx);q.push([nx,ny]);}}}
  return v;
}

function resetEffects(){
  for(let n in activeEffects){clearTimeout(activeEffects[n].timer);if(EFFECT_DEFS[n])EFFECT_DEFS[n].remove();}
  activeEffects={};stepSize=1;magicShieldActive=false;magnetActive=false;lavaImmune=false;
  ghostMode=false;luckyMode=false;invincibleMode=false;weaknessActive=false;strengthActive=false;
  freezeMonsters=false;vision=5;shield=false;
  bleedLevel=0;bleedHitCount=0;poisonLevel=0;poisonHitCount=0;
  frostLevel=0;frostHitCount=0;burnLevel=0;speedLevel=0;speedStepsLeft=0;
  corruptLevel=0;corruptHitCount=0;activeTraps=[];xrayActive=false;
  fireProtectionActive=false;clearInterval(healUpInterval);healUpInterval=null;
  healthBoost=0;healthBoostMax=0;maxHp=100;hp=100;strengthLevel=1;
  clearInterval(halluInterval);halluInterval=null;
  halluFakeItems=[];halluFakeMonsters=[];
}

function createWorld(){
  let attempts=0;
  while(true){
    attempts++;world=[];
    for(let y=0;y<H;y++){let row=[];for(let x=0;x<W;x++)row.push(Math.random()<0.18?"tree":"empty");world.push(row);}
    world[1][1]="empty";world[H-2][W-2]="empty";
    let reachable=floodFill(1,1),totalEmpty=0;
    for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]!=="tree")totalEmpty++;
    if(reachable.size>=totalEmpty*0.85){
      for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]!=="tree"&&!reachable.has(y*W+x))world[y][x]="tree";
      break;
    }
    if(attempts>10){for(let y=0;y<H;y++)for(let x=0;x<W;x++)if(world[y][x]==="tree"&&Math.random()<0.4)world[y][x]="empty";break;}
  }
  player={x:1,y:1};resetEffects();
}

function getReachableCells(){
  let cells=[];floodFill(player.x,player.y).forEach(id=>{let x=id%W,y=Math.floor(id/W);if(world[y][x]==="empty")cells.push({x,y});});return cells;
}
function randomEmptyCell(cells){for(let i=0;i<200;i++){let c=cells[Math.floor(Math.random()*cells.length)];if(c&&world[c.y][c.x]==="empty")return c;}return null;}

function spawnMonsters(){
  let cells=getReachableCells();monsters=[];
  let types=["normal"];
  if(stage>=3)types.push("fire");
  if(stage>=6)types.push("ice");
  if(stage>=4)types.push("infected");
  if(stage>=5&&stage%5===0)types.push("corruption");
  for(let type of types){
    let best=null;
    for(let i=0;i<50;i++){
      let cell=cells[Math.floor(Math.random()*cells.length)];if(!cell)continue;
      let d=Math.abs(cell.x-player.x)+Math.abs(cell.y-player.y);
      let farFromOthers=monsters.every(m=>Math.abs(m.x-cell.x)+Math.abs(m.y-cell.y)>10);
      if(d>20&&farFromOthers)best=cell;
    }
    if(best)monsters.push({x:best.x,y:best.y,type,cd1:0,cd2:0,cd3:0,cd4:0,cd5:0,traps:0});
  }
  if(monsters.length===0)monsters=[{x:W-2,y:H-2,type:"normal",cd1:0,cd2:0,cd3:0,cd4:0,cd5:0,traps:0}];
}

function placeItems(){
  itemTarget={};itemCollected={};
  let cells=getReachableCells();
  let all=["gold","copper","silver","diamond","iron","obsidian"];
  let active=all.sort(()=>Math.random()-0.5).slice(0,4);
  if(!active.includes("gold"))active[0]="gold";
  active.forEach(type=>{
    let count=type==="gold"?Math.floor(Math.random()*16)+10:Math.floor(Math.random()*9)+2;
    itemTarget[type]=count;itemCollected[type]=0;
    let placed=0;while(placed<count){let c=randomEmptyCell(cells);if(!c)break;world[c.y][c.x]=type;placed++;}
  });
  for(let i=0;i<10;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="med";}
  for(let i=0;i<3;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="medkit";}
  for(let i=0;i<8;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="energy";}
  for(let i=0;i<5;i++){let c=randomEmptyCell(cells);if(c)world[c.y][c.x]="question";}
}

/* ══ CAMERA ══ */
function getCamera(){
  let cx=Math.max(0,Math.min(W-VIEW_W,Math.floor(player.x-VIEW_W/2)));
  let cy=Math.max(0,Math.min(H-VIEW_H,Math.floor(player.y-VIEW_H/2)));
  return{cx,cy};
}

/* ══ HUD ══ */
function drawHud(){
  let now=Date.now(),lines=[];
  for(let name in activeEffects){
    let def=EFFECT_DEFS[name];if(!def)continue;
    let rem=Math.max(0,Math.ceil((activeEffects[name].endTime-now)/1000));
    let color=def.good?"#0f0":"#f44";
    lines.push(`<div style="color:${color};margin:1px 0;font-size:10px">${def.emoji} ${def.label} — ${rem}s</div>`);
  }
  effectsHudEl.innerHTML=lines.length
    ?`<div style="color:#aaa;font-size:9px">⚗️ Effects:</div>`+lines.join("")
    :`<div style="color:#333;font-size:9px">⚗️ No effects</div>`;
  let itemHtml=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:10px;">`;
  for(let k in itemTarget){let count=itemCollected[k]||0,target=itemTarget[k];itemHtml+=`<div style="color:${count>=target?"lime":"#cfffcc"}">${itemEmoji[k]} ${count}/${target}</div>`;}
  itemHtml+=`</div>`;
  itemsHud.innerHTML=itemHtml;
}
setInterval(drawHud,500);

/* ══ DRAW ══ */
function drawWorld(){
  game.innerHTML="";
  game.style.gridTemplateColumns=`repeat(${VIEW_W},${CELL_SIZE}px)`;
  const{cx,cy}=getCamera();
  for(let row=0;row<VIEW_H;row++){
    for(let col=0;col<VIEW_W;col++){
      let x=cx+col,y=cy+row;
      let div=document.createElement("div");div.style.width=CELL_SIZE+"px";div.style.height=CELL_SIZE+"px";div.style.fontSize=Math.max(7,CELL_SIZE-4)+"px";div.classList.add("cell");
      let visible=Math.sqrt((player.x-x)**2+(player.y-y)**2)<=vision;
      if(visible&&x>=0&&x<W&&y>=0&&y<H){
        let cell=world[y][x];
        if(cell==="lava"){div.style.background="rgb(180,40,0)";div.style.boxShadow="inset 0 0 4px rgba(255,100,0,0.8)";}
        else if(cell==="spike"){div.style.background="rgb(15,0,25)";}
        else if(cell==="tree"){div.style.background="rgb(36,129,36)";}
        else{div.style.background="rgb(36,129,36)";}
        
        if(player.x===x&&player.y===y)div.textContent="🧍";
        else if(cell==="tree")div.textContent="🌲";
        else if(cell==="lava")div.textContent="🔥";
        else if(itemEmoji[cell])div.textContent=itemEmoji[cell];
        
        monsters.forEach(m=>{
          if(m.x===x&&m.y===y){
            if(monsterImgs[m.type]){
              div.style.backgroundImage=`url('${monsterImgs[m.type]}')`;
              div.style.backgroundSize="contain";div.style.backgroundRepeat="no-repeat";
              div.style.backgroundPosition="center";
            }else{
              div.textContent=m.type==="fire"?"🔴":m.type==="ice"?"🔵":m.type==="corruption"?"🟣":m.type==="infected"?"🦠":"👹";
            }
          }
        });
      }else{div.style.background="rgb(20,20,20)";}
      game.appendChild(div);
    }
  }
  levelEl.textContent=stage;
  let hpPercent=(hp/maxHp)*100;
  hpBar.style.width=Math.max(0,hpPercent)+"%";
  hpBar.style.background=hp>60?"lime":hp>30?"orange":"red";
  
  /* Health Boost bar */
  const boostWrap=document.getElementById("boostBarWrap");
  const boostBarEl=document.getElementById("boostBar");
  if(boostWrap&&boostBarEl){
    if(healthBoost>0){
      boostWrap.style.display="block";
      let boostPercent=(healthBoost/healthBoostMax)*100;
      boostBarEl.style.width=boostPercent+"%";
    }else boostWrap.style.display="none";
  }
  drawHud();
}

/* ══ HEAL BOOST DAMAGE SYSTEM ══ */
function takeDamage(amount){
  if(invincibleMode||ghostMode){ludki("🛡️ Protected!","No damage!","collect");return;}
  
  if(healthBoost>0){
    let remaining=amount;
    if(remaining<=healthBoost){
      healthBoost-=remaining;
      ludki(`💗 Health Boost`,`−${remaining} HP (Boost)","damage");
    }else{
      remaining-=healthBoost;
      healthBoost=0;
      hp-=remaining;
      ludki(`❤️ HP`,`−${remaining} HP (Main)","damage");
      if(hp<=0)triggerDeath("Defeated 💀");
      if(healthBoost<=0){delete activeEffects["healthBoostI"];delete activeEffects["healthBoostII"];delete activeEffects["healthBoostIII"];}
    }
  }else{
    hp-=amount;
    ludki(`❤️ HP`,`−${amount} HP","damage");
    if(hp<=0)triggerDeath("Defeated 💀");
  }
  drawWorld();
}

/* ══ DEATH ══ */
function triggerDeath(reason){
  hp=100;maxHp=100;hitCooldown=false;levelCleared=false;paused=true;
  resetEffects();
  ludki("💀 GAME OVER",reason,"gameover");
  document.getElementById("gameOverReason").textContent=reason;
  document.getElementById("gameOverScreen").classList.add("show");
}

document.getElementById("retryBtn").addEventListener("click",()=>{
  document.getElementById("gameOverScreen").classList.remove("show");
  paused=false;
  createWorld();placeItems();spawnMonsters();drawWorld();
  if(!window._gameLoop)window._gameLoop=setInterval(gameLoop,500);
});

/* ══ MAIN GAME LOOP ══ */
function gameLoop(){
  if(paused)return;
  updateMonsters();
  drawWorld();
}

function updateMonsters(){
  monsters.forEach((m,i)=>{
    let dist=Math.abs(m.x-player.x)+Math.abs(m.y-player.y);
    
    if(m.type==="shawarmaElHeaween"){
      if(m.cd1>0)m.cd1--;
      if(dist<20&&Math.random()<0.1&&m.cd1===0){
        takeDamage(21);
        applyEffect("infectedII");
        m.cd1=20;
      }
    }
    else if(m.type==="jeffreyEpstein"){
      if(m.cd1>0)m.cd1--;
      if(dist<20&&Math.random()<0.1&&m.cd1===0){
        takeDamage(30);
        applyEffect("corruption");
        m.cd1=15;
      }
    }
    else if(m.type==="lary"){
      if(m.cd1>0)m.cd1--;
      if(m.laryAngry){
        if(m.cd5>0)m.cd5--;
        if(m.cd5===0){
          m.laryAngry=false;
          ludki("😤 Lary","Calmed down","damage");
        }
      }
      if(dist<20&&Math.random()<0.1&&m.cd1===0){
        takeDamage(25);
        applyEffect("bleedingI");
        m.cd1=12;
      }
    }
    else if(m.type==="jobApplication"){
      if(m.cd1>0)m.cd1--;
      if(dist<20&&Math.random()<0.1&&m.cd1===0){
        takeDamage(22);
        applyEffect("weakness");
        applyEffect("burning");
        m.cd1=15;
      }
    }
    else if(m.type==="hitler"){
      if(m.cd1>0)m.cd1--;
      if(dist<20&&Math.random()<0.1&&m.cd1===0){
        takeDamage(26);
        applyEffect("burning");
        m.cd1=18;
      }
    }
  });
}

/* ══ KEYBOARD CONTROLS ══ */
const keys={};
window.addEventListener("keydown",e=>{keys[e.key.toLowerCase()]=true;});
window.addEventListener("keyup",e=>{keys[e.key.toLowerCase()]=false;});

function movePlayer(){
  let nx=player.x,ny=player.y;
  if(keys["w"]||keys["arrowup"])ny--;
  if(keys["s"]||keys["arrowdown"])ny++;
  if(keys["a"]||keys["arrowleft"])nx--;
  if(keys["d"]||keys["arrowright"])nx++;
  
  if(nx>=0&&nx<W&&ny>=0&&ny<H&&world[ny][nx]!=="tree"){
    player.x=nx;player.y=ny;
  }
}

/* ══ MOBILE CONTROLS ══ */
document.getElementById("btn-up")?.addEventListener("touchstart",e=>{e.preventDefault();keys["w"]=true;});
document.getElementById("btn-up")?.addEventListener("touchend",e=>{e.preventDefault();keys["w"]=false;});
document.getElementById("btn-down")?.addEventListener("touchstart",e=>{e.preventDefault();keys["s"]=true;});
document.getElementById("btn-down")?.addEventListener("touchend",e=>{e.preventDefault();keys["s"]=false;});
document.getElementById("btn-left")?.addEventListener("touchstart",e=>{e.preventDefault();keys["a"]=true;});
document.getElementById("btn-left")?.addEventListener("touchend",e=>{e.preventDefault();keys["a"]=false;});
document.getElementById("btn-right")?.addEventListener("touchstart",e=>{e.preventDefault();keys["d"]=true;});
document.getElementById("btn-right")?.addEventListener("touchend",e=>{e.preventDefault();keys["d"]=false;});

function togglePause(){paused=!paused;document.getElementById("pauseMenu").style.display=paused?"flex":"none";}
function resetLevel(){paused=false;createWorld();placeItems();spawnMonsters();drawWorld();}
function resetGame(){paused=false;stage=1;hp=100;maxHp=100;createWorld();placeItems();spawnMonsters();drawWorld();}

document.getElementById("btn-pause")?.addEventListener("click",togglePause);

/* ══ INIT ══ */
createWorld();
placeItems();
spawnMonsters();
drawWorld();
window._gameLoop=setInterval(()=>{if(!paused){movePlayer();gameLoop();}},500);
</script>
